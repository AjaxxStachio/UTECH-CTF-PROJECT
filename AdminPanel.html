<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTech CTF Hub | Advanced CMS Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #50fa7b; --neon-blue: #3e9eff; --neon-cyan: #8be9fd;
            --neon-purple: #bd93f9; --neon-yellow: #f1fa8c; --neon-red: #ff5555;
            --neon-orange: #ffb86b; --neon-pink: #ff79c6;
            --bg-primary: #0a0e1a; --bg-secondary: #141b2b;
            --border-color: #2a3550; --text-primary: #e0e0e0; --text-secondary: #8892b0;
            --card-bg: #0f1322;
        }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', 'Share Tech Mono', monospace; overflow: hidden; }
        #matrixRain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; pointer-events: none; }

        .admin-terminal { height: 100vh; display: flex; flex-direction: column; background: rgba(10,12,15,.96); }
        .terminal-header { background: linear-gradient(90deg,#040608,var(--bg-secondary)); border-bottom: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(62,158,255,.2); flex-shrink: 0; }
        .terminal-toolbar { padding: .75rem 1.5rem; display: flex; align-items: center; gap: 2rem; }
        .terminal-buttons { display: flex; gap: .5rem; }
        .term-btn { width: 14px; height: 14px; border-radius: 50%; }
        .term-btn.close { background: #ff5f56; } .term-btn.minimize { background: #ffbd2e; } .term-btn.maximize { background: #27c93f; }
        .terminal-title { flex: 1; display: flex; align-items: center; gap: .75rem; color: var(--neon-blue); font-size: .9rem; text-transform: uppercase; letter-spacing: 1px; }
        .terminal-status { display: flex; align-items: center; gap: .5rem; padding: .25rem 1rem; background: rgba(62,255,158,.1); border: 1px solid var(--neon-green); border-radius: 20px; }
        .status-led { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green); animation: ledPulse 1.5s infinite; }
        @keyframes ledPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.2)} }
        
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar { width: 280px; background: linear-gradient(180deg,#040608,var(--bg-secondary)); border-right: 2px solid var(--neon-purple); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(158,62,255,.3); }
        .admin-profile { display: flex; align-items: center; gap: 1rem; }
        .admin-profile > i { font-size: 2.5rem; color: var(--neon-purple); }
        .profile-name { font-size: 1.1rem; color: var(--neon-blue); }
        .profile-role { font-size: .7rem; color: var(--neon-pink); letter-spacing: 2px; }
        .sidebar-nav { flex: 1; padding: 1rem 0; display: flex; flex-direction: column; gap: .25rem; }
        .nav-item { padding: .8rem 1.5rem; display: flex; align-items: center; gap: 1rem; color: var(--text-secondary); cursor: pointer; border-left: 3px solid transparent; transition: all .3s; }
        .nav-item i { width: 20px; } .nav-item span { flex: 1; font-size: .85rem; letter-spacing: 1px; }
        .nav-count { background: rgba(62,158,255,.2); border: 1px solid var(--neon-blue); padding: .2rem .5rem; border-radius: 3px; font-size: .7rem; }
        .nav-item:hover { background: rgba(158,62,255,.1); border-left-color: var(--neon-purple); color: var(--neon-purple); }
        .nav-item.active { background: rgba(80,250,123,.1); border-left-color: var(--neon-green); color: var(--neon-green); }
        .sidebar-footer { padding: 1rem; border-top: 1px solid rgba(158,62,255,.3); display: flex; flex-direction: column; gap: .5rem; }
        .cyber-btn-exit, .logout-btn { width: 100%; padding: .7rem; background: transparent; font-family: monospace; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; transition: all .3s; border-radius: 4px; }
        .cyber-btn-exit { border: 2px solid var(--neon-orange); color: var(--neon-orange); }
        .cyber-btn-exit:hover { background: var(--neon-orange); color: var(--bg-primary); }
        .logout-btn { border: 2px solid var(--neon-red); color: var(--neon-red); }
        .logout-btn:hover { background: var(--neon-red); color: var(--bg-primary); }
        
        .admin-content { flex: 1; overflow-y: auto; padding: 2rem; }
        .section-header { margin-bottom: 2rem; }
        .section-header h2 { color: var(--neon-green); margin-bottom: .5rem; display: flex; align-items: center; gap: .75rem; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; text-align: center; transition: all .3s; }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--neon-green); }
        .stat-card h3 { font-size: .85rem; color: var(--text-secondary); margin-bottom: .5rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 2rem; font-weight: 700; color: var(--neon-green); }
        
        /* CMS Tile Styles */
        .cms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .cms-tile { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; transition: all .3s; position: relative; }
        .cms-tile:hover { transform: translateY(-5px); border-color: var(--neon-green); box-shadow: 0 5px 20px rgba(80,250,123,.1); }
        .cms-tile-actions { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.5rem; }
        .cms-tile-actions button { background: rgba(0,0,0,0.7); border: none; color: var(--text-secondary); cursor: pointer; padding: 5px 8px; border-radius: 4px; transition: all .2s; }
        .cms-tile-actions button:hover { color: var(--neon-red); }
        .cms-tile-actions button.edit:hover { color: var(--neon-blue); }
        
        .action-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .cyber-btn { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: .5rem 1.5rem; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: .5rem; transition: all .3s; font-family: monospace; }
        .cyber-btn.primary { border-color: var(--neon-green); color: var(--neon-green); }
        .cyber-btn.primary:hover { background: var(--neon-green); color: var(--bg-primary); transform: scale(1.02); }
        .cyber-btn.danger { border-color: var(--neon-red); color: var(--neon-red); }
        .cyber-btn.danger:hover { background: var(--neon-red); color: var(--bg-primary); }
        
        /* Table Styles */
        .table-container { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: auto; max-height: 500px; }
        .cyber-table { width: 100%; border-collapse: collapse; }
        .cyber-table th { padding: 1rem; text-align: left; color: var(--neon-blue); border-bottom: 2px solid var(--neon-purple); position: sticky; top: 0; background: var(--card-bg); }
        .cyber-table td { padding: 1rem; border-bottom: 1px solid var(--border-color); color: var(--text-secondary); }
        .cyber-table tr:hover { background: rgba(80,250,123,.05); }
        .table-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0 5px; font-size: 1rem; transition: color .2s; }
        .table-btn.delete:hover { color: var(--neon-red); }
        
        .status-badge { padding: .25rem .75rem; border-radius: 20px; font-size: .7rem; display: inline-block; }
        .status-badge.enabled { background: rgba(80,250,123,.1); border: 1px solid var(--neon-green); color: var(--neon-green); }
        .status-badge.admin { background: rgba(189,147,249,.1); border: 1px solid var(--neon-purple); color: var(--neon-purple); }
        .difficulty-badge { background: rgba(80,250,123,0.2); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .category-badge { background: rgba(62,158,255,0.2); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-left: 0.5rem; }
        
        /* Modal Styles */
        .cyber-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-terminal { background: var(--bg-secondary); border: 2px solid var(--neon-green); border-radius: 16px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .modal-terminal-header { padding: 1rem; border-bottom: 2px solid var(--neon-green); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg-secondary); }
        .modal-terminal-body { padding: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: .5rem; color: var(--neon-blue); font-size: .85rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); padding: .75rem; border-radius: 8px; font-family: monospace; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        
        .db-status-indicator { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,.8); padding: 5px 10px; border-radius: 5px; font-size: 10px; z-index: 1000; color: var(--text-secondary); }
        .toast-notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg-secondary); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 12px 24px; border-radius: 8px; z-index: 10001; animation: slideUp .3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
        
        /* Improved Secure Logout Modal */
        .logout-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .logout-modal-container {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
            border: 2px solid var(--neon-orange);
            border-radius: 24px;
            width: 420px;
            max-width: 90%;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 184, 107, 0.3), 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .logout-modal-header {
            background: linear-gradient(135deg, rgba(255, 184, 107, 0.15), rgba(255, 85, 85, 0.05));
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 184, 107, 0.3);
        }
        
        .logout-modal-header i {
            font-size: 3rem;
            color: var(--neon-orange);
            margin-bottom: 0.75rem;
            text-shadow: 0 0 20px var(--neon-orange);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        
        .logout-modal-header h3 { color: var(--neon-orange); font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 0.5rem; text-transform: uppercase; }
        .logout-modal-header p { color: var(--text-secondary); font-size: 0.85rem; }
        
        .logout-modal-body { padding: 2rem; }
        
        .passkey-input-group { margin-bottom: 1.5rem; }
        .passkey-input-group label { display: block; color: var(--neon-blue); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.75rem; }
        .passkey-input-wrapper { position: relative; display: flex; align-items: center; }
        .passkey-input-wrapper i { position: absolute; left: 1rem; color: var(--neon-orange); font-size: 1rem; }
        .passkey-input { width: 100%; background: var(--bg-primary); border: 2px solid var(--border-color); color: var(--text-primary); padding: 1rem 1rem 1rem 2.5rem; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 1rem; transition: all 0.3s ease; }
        .passkey-input:focus { outline: none; border-color: var(--neon-orange); box-shadow: 0 0 15px rgba(255, 184, 107, 0.3); }
        
        .logout-modal-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .logout-modal-actions button { flex: 1; padding: 0.85rem; font-family: monospace; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; border-radius: 10px; }
        .btn-confirm-logout { background: linear-gradient(135deg, var(--neon-orange), #ff9f4a); border: none; color: var(--bg-primary); }
        .btn-confirm-logout:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--neon-orange); }
        .btn-cancel-logout { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-cancel-logout:hover { background: var(--neon-blue); color: var(--bg-primary); transform: translateY(-2px); }
        
        .error-message { background: rgba(255, 85, 85, 0.1); border: 1px solid var(--neon-red); border-radius: 8px; padding: 0.75rem; margin-top: 1rem; color: var(--neon-red); font-size: 0.8rem; text-align: center; display: none; }
        .error-message.show { display: block; animation: shake 0.3s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .logout-warning { display: flex; align-items: center; gap: 0.5rem; background: rgba(255, 184, 107, 0.1); border-radius: 8px; padding: 0.75rem; margin-bottom: 1.5rem; font-size: 0.75rem; color: var(--neon-yellow); }
        
        /* User Section Styles */
        .user-section { background: var(--card-bg); border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; }
        .user-section-header { padding: 1rem 1.5rem; border-bottom: 2px solid var(--neon-green); display: flex; align-items: center; gap: 0.75rem; }
        .user-section-header h3 { color: var(--neon-green); font-size: 1rem; }
        .user-section-header .count-badge { background: rgba(80,250,123,0.2); border: 1px solid var(--neon-green); border-radius: 20px; padding: 0.2rem 0.6rem; font-size: 0.7rem; }
        
        .homepage-editor { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; margin-top: 1rem; border: 1px solid var(--border-color); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--neon-green); border-radius: 3px; }
    </style>
</head>
<body>
<canvas id="matrixRain"></canvas>

<div id="adminTerminal" class="admin-terminal">
    <div class="terminal-header">
        <div class="terminal-toolbar">
            <div class="terminal-buttons"><span class="term-btn close"></span><span class="term-btn minimize"></span><span class="term-btn maximize"></span></div>
            <div class="terminal-title"><i class="fas fa-database"></i><span>cms@ctf-platform:~/admin</span></div>
            <div class="terminal-status"><span class="status-led"></span><span>CMS ONLINE</span></div>
            <button class="cyber-btn danger" onclick="promptSecureLogout()" style="padding:.3rem .8rem;"><i class="fas fa-power-off"></i> SECURE EXIT</button>
        </div>
    </div>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <div class="admin-profile">
                    <i class="fas fa-user-shield"></i>
                    <div><div class="profile-name" id="adminUsername">Admin</div><div class="profile-role">CMS ADMIN</div></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item active" data-section="dashboard"><i class="fas fa-tachometer-alt"></i><span>DASHBOARD</span></a>
                <a class="nav-item" data-section="homepage"><i class="fas fa-home"></i><span>HOMEPAGE</span><span class="nav-count">CMS</span></a>
                <a class="nav-item" data-section="learn"><i class="fas fa-graduation-cap"></i><span>LEARN</span><span class="nav-count">CMS</span></a>
                <a class="nav-item" data-section="challenges"><i class="fas fa-flag"></i><span>CHALLENGES</span><span id="challengeCountBadge" class="nav-count">0</span></a>
                <a class="nav-item" data-section="quizzes"><i class="fas fa-question-circle"></i><span>QUIZZES</span><span id="quizCountBadge" class="nav-count">0</span></a>
                <a class="nav-item" data-section="jeopardy"><i class="fas fa-puzzle-piece"></i><span>JEOPARDY</span><span id="jeopardyCountBadge" class="nav-count">0</span></a>
                <a class="nav-item" data-section="users"><i class="fas fa-users"></i><span>USERS</span><span id="userCountBadge" class="nav-count">0</span></a>
                <a class="nav-item" data-section="submissions"><i class="fas fa-check-circle"></i><span>SUBMISSIONS</span><span id="submissionCountBadge" class="nav-count">0</span></a>
                <a class="nav-item" data-section="system"><i class="fas fa-cog"></i><span>SYSTEM</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="cyber-btn-exit" onclick="promptSecureLogout()"><i class="fas fa-sign-out-alt"></i><span>SECURE LOGOUT</span></button>
                <button class="logout-btn" onclick="exportAllData()"><i class="fas fa-download"></i><span>BACKUP ALL</span></button>
            </div>
        </aside>
        <main class="admin-content" id="mainContent"></main>
    </div>
</div>

<div class="db-status-indicator"><i class="fas fa-database"></i> CMS: <span id="dbStatusText">Online</span></div>

<div id="cmsModal" class="cyber-modal">
    <div class="modal-terminal">
        <div class="modal-terminal-header"><span id="modalTitle">Manage Item</span><button onclick="closeModal()" style="background:none;border:none;color:var(--neon-red);font-size:1.8rem;cursor:pointer;">&times;</button></div>
        <div class="modal-terminal-body">
            <form id="cmsForm">
                <input type="hidden" id="itemType">
                <input type="hidden" id="itemId">
                <div id="dynamicFields"></div>
                <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1rem;">
                    <button type="button" class="cyber-btn" onclick="closeModal()">CANCEL</button>
                    <button type="submit" class="cyber-btn primary">SAVE</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// ========== DATABASE KEYS - SYNCED ACROSS ALL SYSTEMS ==========
const DB_KEYS = {
    HOMEPAGE: 'cms_homepage',
    LEARN_TOPICS: 'cms_learn_topics',
    CHALLENGES: 'cms_challenges',
    QUIZZES: 'cms_quizzes',
    JEOPARDY: 'cms_jeopardy',
    // CRITICAL: Both keys must be updated for scoreboard to see users
    USERS_ARRAY: 'ctf_db_users',        // Admin panel uses array format
    USERS_OBJECT: 'ctf_users',          // Registration/scoreboard uses object format
    SUBMISSIONS: 'ctf_db_submissions',
    CURRENT_USER: 'ctf_current_user',
    USER_POINTS: 'ctf_user_points'
};

// ========== INITIAL DATA ==========
const defaultHomepage = {
    heroTitle: "Welcome to UTECH CTF Hub",
    heroSubtitle: "Test your cybersecurity skills with hands-on challenges",
    features: [
        { icon: "fa-shield-alt", title: "CTF Challenges", description: "Real-world cybersecurity challenges" },
        { icon: "fa-graduation-cap", title: "Learning Materials", description: "Comprehensive guides" },
        { icon: "fa-trophy", title: "Leaderboard", description: "Compete with others" },
        { icon: "fa-brain", title: "Interactive Quizzes", description: "Test your knowledge" }
    ]
};

const defaultLearnTopics = [
    { id: 1, title: "SQL Injection Basics", icon: "fa-database", category: "web", difficulty: "beginner", points: 10, description: "Learn how SQL injection works and how to prevent it" },
    { id: 2, title: "XSS Attacks", icon: "fa-code", category: "web", difficulty: "intermediate", points: 10, description: "Cross-site scripting vulnerabilities explained" },
    { id: 3, title: "Cryptography Essentials", icon: "fa-lock", category: "crypto", difficulty: "beginner", points: 10, description: "Understanding encryption and hashing" }
];

const defaultChallenges = [
    { id: 101, title: "SQL Injection 101", category: "Web", points: 150, flag: "flag{sqli_test}", description: "Learn basic SQL injection techniques", difficulty: "Beginner" },
    { id: 102, title: "XSS Vulnerability", category: "Web", points: 200, flag: "flag{xss_test}", description: "Cross-site scripting attack vectors", difficulty: "Beginner" }
];

const defaultQuizzes = [
    { id: 201, title: "Cybersecurity Basics", questions: 10, points: 100, description: "Test your knowledge on cybersecurity fundamentals" }
];

const defaultJeopardy = [
    { id: 301, category: "Web Security", points: 100, question: "What does SQL stand for?", answer: "Structured Query Language", difficulty: "Easy" },
    { id: 302, category: "Web Security", points: 200, question: "What is XSS?", answer: "Cross-Site Scripting", difficulty: "Easy" },
    { id: 303, category: "Cryptography", points: 100, question: "What does AES stand for?", answer: "Advanced Encryption Standard", difficulty: "Easy" }
];

class Database {
    static get(key, defaults) {
        try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : defaults; } catch(e) { return defaults; }
    }
    static set(key, value) { localStorage.setItem(key, JSON.stringify(value)); this.updateStorageSize(); }
    static updateStorageSize() {
        let size = 0;
        for(let key in localStorage) if(localStorage.hasOwnProperty(key)) size += localStorage[key].length * 2;
        const el = document.getElementById('storageSize');
        if(el) el.textContent = (size / 1024).toFixed(2) + ' KB';
    }
    static getHomepage() { return this.get(DB_KEYS.HOMEPAGE, defaultHomepage); }
    static saveHomepage(v) { this.set(DB_KEYS.HOMEPAGE, v); }
    static getLearnTopics() { return this.get(DB_KEYS.LEARN_TOPICS, defaultLearnTopics); }
    static saveLearnTopics(v) { this.set(DB_KEYS.LEARN_TOPICS, v); }
    static getChallenges() { return this.get(DB_KEYS.CHALLENGES, defaultChallenges); }
    static saveChallenges(v) { this.set(DB_KEYS.CHALLENGES, v); }
    static getQuizzes() { return this.get(DB_KEYS.QUIZZES, defaultQuizzes); }
    static saveQuizzes(v) { this.set(DB_KEYS.QUIZZES, v); }
    static getJeopardy() { return this.get(DB_KEYS.JEOPARDY, defaultJeopardy); }
    static saveJeopardy(v) { this.set(DB_KEYS.JEOPARDY, v); }
    static getSubmissions() { return this.get(DB_KEYS.SUBMISSIONS, []); }
    static saveSubmissions(v) { this.set(DB_KEYS.SUBMISSIONS, v); }
    
    // CRITICAL: Get users from both storage formats and merge
    static getUsers() {
        let usersArray = this.get(DB_KEYS.USERS_ARRAY, []);
        let usersObject = this.get(DB_KEYS.USERS_OBJECT, {});
        
        // Convert object format to array format
        const usersFromObject = Object.values(usersObject);
        
        // Merge both sources, avoiding duplicates
        const mergedUsers = [...usersArray];
        for (const user of usersFromObject) {
            if (!mergedUsers.some(u => u.username === user.username)) {
                mergedUsers.push(user);
            }
        }
        
        // Ensure admin user exists
        if (!mergedUsers.some(u => u.username === 'admin')) {
            mergedUsers.unshift({id: 1, username: 'admin', email: 'admin@ctf.com', password: 'admin123', role: 'admin', points: 0, registered: new Date().toISOString()});
        }
        
        return mergedUsers;
    }
    
    // CRITICAL: Save users to BOTH storage formats for cross-system compatibility
    static saveUsers(users) {
        // Save as array format
        this.set(DB_KEYS.USERS_ARRAY, users);
        
        // Save as object format (for registration page and scoreboard)
        const usersObject = {};
        users.forEach(user => {
            usersObject[user.username] = {
                username: user.username,
                password: user.password || 'default123',
                email: user.email,
                role: user.role,
                points: user.points || 0,
                solves: user.solves || 0,
                registered: user.registered || new Date().toISOString(),
                lastActivity: user.lastActivity || Date.now()
            };
        });
        localStorage.setItem(DB_KEYS.USERS_OBJECT, JSON.stringify(usersObject));
        
        // Trigger storage event for other tabs
        window.dispatchEvent(new Event('storage'));
    }
    
    static getCurrentUser() {
        try { return JSON.parse(localStorage.getItem(DB_KEYS.CURRENT_USER)); } catch(e) { return null; }
    }
    static setCurrentUser(u) { localStorage.setItem(DB_KEYS.CURRENT_USER, JSON.stringify(u)); }
    static clearCurrentUser() { localStorage.removeItem(DB_KEYS.CURRENT_USER); }
    
    static init() {
        if(!localStorage.getItem(DB_KEYS.HOMEPAGE)) this.saveHomepage(defaultHomepage);
        if(!localStorage.getItem(DB_KEYS.LEARN_TOPICS)) this.saveLearnTopics(defaultLearnTopics);
        if(!localStorage.getItem(DB_KEYS.CHALLENGES)) this.saveChallenges(defaultChallenges);
        if(!localStorage.getItem(DB_KEYS.QUIZZES)) this.saveQuizzes(defaultQuizzes);
        if(!localStorage.getItem(DB_KEYS.JEOPARDY)) this.saveJeopardy(defaultJeopardy);
        if(!localStorage.getItem(DB_KEYS.SUBMISSIONS)) this.saveSubmissions([]);
        
        // Initialize users if empty
        const existingUsers = this.getUsers();
        if(existingUsers.length === 0 || !existingUsers.some(u => u.username === 'admin')) {
            this.saveUsers([{id: 1, username: 'admin', email: 'admin@ctf.com', password: 'admin123', role: 'admin', points: 0, registered: new Date().toISOString()}]);
        }
        
        this.updateStorageSize();
        document.getElementById('dbStatusText').textContent = '🟢 Online';
    }
}

function showToast(msg, isError = false) {
    const toast = document.createElement('div'); toast.className = 'toast-notification';

function promptSecureLogout() {
    const overlay = document.createElement('div');
    overlay.className = 'logout-modal-overlay';
    overlay.innerHTML = `
        <div class="logout-modal-container">
            <div class="logout-modal-header">
                <i class="fas fa-shield-alt"></i>
                <h3>SECURE LOGOUT</h3>

                    <span>This action will end your current admin session. You will need to login again.</span>
                </div>
                <div class="passkey-input-group">
                    <label><i class="fas fa-key"></i> ADMIN PASSKEY</label>
                    <div class="passkey-input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="logoutPasskey" class="passkey-input" placeholder="Enter secure passkey" autocomplete="off">
                    </div>
                </div>
                <div id="logoutErrorMsg" class="error-message">
                    <i class="fas fa-times-circle"></i> Invalid passkey! Access denied.
                </div>
                <div class="logout-modal-actions">
                    <button id="cancelLogoutBtn" class="btn-cancel-logout"><i class="fas fa-times"></i> CANCEL</button>
                    <button id="confirmLogoutBtn" class="btn-confirm-logout"><i class="fas fa-sign-out-alt"></i> VERIFY & LOGOUT</button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);

    const input = overlay.querySelector('#logoutPasskey');
    const confirmBtn = overlay.querySelector('#confirmLogoutBtn');
    const cancelBtn = overlay.querySelector('#cancelLogoutBtn');
    const errorDiv = overlay.querySelector('#logoutErrorMsg');
    
    input.focus();

    function performSecureLogout() {
        if (input.value === 'nimda321') {
            overlay.remove();
            sessionStorage.setItem('forcedLogout', 'true');
            sessionStorage.removeItem('userSession');
            localStorage.removeItem('userData');
            Database.clearCurrentUser();
            showToast('🔐 Logged out successfully! Redirecting...');
            setTimeout(() => { window.location.replace('login.html'); }, 500);
        } else {
            errorDiv.classList.add('show');
            input.value = '';
            input.focus();
            input.style.borderColor = 'var(--neon-red)';
            setTimeout(() => { input.style.borderColor = ''; }, 500);
        }
    }

    confirmBtn.addEventListener('click', performSecureLogout);
    cancelBtn.addEventListener('click', () => overlay.remove());
    input.addEventListener('keypress', e => { if (e.key === 'Enter') performSecureLogout(); });
    input.addEventListener('input', () => {
        errorDiv.classList.remove('show');
        input.style.borderColor = '';
    });
}

        loadSection('users');

function openModal(type, id, data) {
    const modal = document.getElementById('cmsModal');
    document.getElementById('modalTitle').innerText = `${id ? 'Edit' : 'Add'} ${type.charAt(0).toUpperCase() + type.slice(1)}`;
    document.getElementById('itemType').value = type;
    document.getElementById('itemId').value = id || '';
    
    const templates = {
        feature: `<div class="form-group"><label>ICON</label><input id="icon" value="${data.icon}"></div><div class="form-group"><label>TITLE</label><input id="title" value="${escapeHtml(data.title)}"></div><div class="form-group"><label>DESCRIPTION</label><textarea id="description">${escapeHtml(data.description)}</textarea></div>`,
        learn: `<div class="form-group"><label>TITLE</label><input id="title" value="${escapeHtml(data.title)}"></div><div class="form-group"><label>ICON</label><input id="icon" value="${data.icon}"></div><div class="form-group"><label>CATEGORY</label><select id="category"><option ${data.category==='web'?'selected':''}>web</option><option ${data.category==='crypto'?'selected':''}>crypto</option><option ${data.category==='network'?'selected':''}>network</option></select></div><div class="form-group"><label>DIFFICULTY</label><select id="difficulty"><option ${data.difficulty==='beginner'?'selected':''}>beginner</option><option ${data.difficulty==='intermediate'?'selected':''}>intermediate</option><option ${data.difficulty==='advanced'?'selected':''}>advanced</option></select></div><div class="form-group"><label>POINTS</label><input type="number" id="points" value="${data.points}"></div><div class="form-group"><label>DESCRIPTION</label><textarea id="description">${escapeHtml(data.description)}</textarea></div>`,
        challenge: `<div class="form-group"><label>TITLE</label><input id="title" value="${escapeHtml(data.title)}"></div><div class="form-group"><label>CATEGORY</label><input id="category" value="${data.category}"></div><div class="form-group"><label>DIFFICULTY</label><select id="difficulty"><option ${data.difficulty==='Beginner'?'selected':''}>Beginner</option><option ${data.difficulty==='Intermediate'?'selected':''}>Intermediate</option><option ${data.difficulty==='Advanced'?'selected':''}>Advanced</option></select></div><div class="form-group"><label>POINTS</label><input type="number" id="points" value="${data.points}"></div><div class="form-group"><label>FLAG</label><input id="flag" value="${data.flag}"></div><div class="form-group"><label>DESCRIPTION</label><textarea id="description">${escapeHtml(data.description)}</textarea></div>`,
        quiz: `<div class="form-group"><label>TITLE</label><input id="title" value="${escapeHtml(data.title)}"></div><div class="form-group"><label>DESCRIPTION</label><textarea id="description">${escapeHtml(data.description)}</textarea></div><div class="form-group"><label>QUESTIONS</label><input type="number" id="questions" value="${data.questions}"></div><div class="form-group"><label>POINTS</label><input type="number" id="points" value="${data.points}"></div>`,
        jeopardy: `<div class="form-group"><label>CATEGORY</label><input id="category" value="${data.category}"></div><div class="form-group"><label>POINTS</label><input type="number" id="points" value="${data.points}"></div><div class="form-group"><label>QUESTION</label><textarea id="question">${escapeHtml(data.question)}</textarea></div><div class="form-group"><label>ANSWER</label><input id="answer" value="${escapeHtml(data.answer)}"></div><div class="form-group"><label>DIFFICULTY</label><select id="difficulty"><option ${data.difficulty==='Easy'?'selected':''}>Easy</option><option ${data.difficulty==='Medium'?'selected':''}>Medium</option><option ${data.difficulty==='Hard'?'selected':''}>Hard</option></select></div>`,
        user: `<div class="form-group"><label>USERNAME</label><input id="username" value="${escapeHtml(data.username)}" required></div>
               <div class="form-group"><label>EMAIL</label><input type="email" id="email" value="${escapeHtml(data.email)}" required></div>
               <div class="form-group"><label>PASSWORD</label><input type="password" id="password" value="${data.password}" required></div>
               <div class="form-group"><label>ROLE</label><select id="role"><option ${data.role==='student'?'selected':''}>student</option><option ${data.role==='admin'?'selected':''}>admin</option></select></div>
               <small style="color: var(--text-secondary);">User will appear on scoreboard immediately after creation</small>`
    };
    document.getElementById('dynamicFields').innerHTML = templates[type];
    modal.style.display = 'flex';
}
function closeModal() { document.getElementById('cmsModal').style.display = 'none'; }

document.getElementById('cmsForm').addEventListener('submit', e => {
    e.preventDefault();
    const type = document.getElementById('itemType').value;
    const id = parseInt(document.getElementById('itemId').value) || Date.now();
    
    if(type === 'feature') {
        const hp = Database.getHomepage();
        const newFeature = { icon: document.getElementById('icon').value, title: document.getElementById('title').value, description: document.getElementById('description').value };
        if(document.getElementById('itemId').value) hp.features[parseInt(document.getElementById('itemId').value)] = newFeature;
        else hp.features.push(newFeature);
        Database.saveHomepage(hp); loadSection('homepage');
    } else if(type === 'learn') {
        let topics = Database.getLearnTopics();
        const newTopic = { id, title: document.getElementById('title').value, icon: document.getElementById('icon').value, category: document.getElementById('category').value, difficulty: document.getElementById('difficulty').value, points: parseInt(document.getElementById('points').value), description: document.getElementById('description').value };
        const idx = topics.findIndex(t => t.id === id);
        if(idx !== -1) topics[idx] = newTopic; else topics.push(newTopic);
        Database.saveLearnTopics(topics); loadSection('learn');
    } else if(type === 'challenge') {
        let challenges = Database.getChallenges();
        const newChallenge = { id, title: document.getElementById('title').value, category: document.getElementById('category').value, difficulty: document.getElementById('difficulty').value, points: parseInt(document.getElementById('points').value), flag: document.getElementById('flag').value, description: document.getElementById('description').value };
        const idx = challenges.findIndex(c => c.id === id);
        if(idx !== -1) challenges[idx] = newChallenge; else challenges.push(newChallenge);
        Database.saveChallenges(challenges); loadSection('challenges');
    } else if(type === 'quiz') {
        let quizzes = Database.getQuizzes();
        const newQuiz = { id, title: document.getElementById('title').value, description: document.getElementById('description').value, questions: parseInt(document.getElementById('questions').value), points: parseInt(document.getElementById('points').value) };
        const idx = quizzes.findIndex(q => q.id === id);
        if(idx !== -1) quizzes[idx] = newQuiz; else quizzes.push(newQuiz);
        Database.saveQuizzes(quizzes); loadSection('quizzes');
    } else if(type === 'jeopardy') {
        let jeopardy = Database.getJeopardy();
        const newQ = { id, category: document.getElementById('category').value, points: parseInt(document.getElementById('points').value), question: document.getElementById('question').value, answer: document.getElementById('answer').value, difficulty: document.getElementById('difficulty').value };
        const idx = jeopardy.findIndex(j => j.id === id);
        if(idx !== -1) jeopardy[idx] = newQ; else jeopardy.push(newQ);
        Database.saveJeopardy(jeopardy); loadSection('jeopardy');
    } else if(type === 'user') {
        let users = Database.getUsers();
        const newUser = { 
            id: id, 
            username: document.getElementById('username').value.toLowerCase().trim(), 
            email: document.getElementById('email').value.trim(), 
            password: document.getElementById('password').value, 
            role: document.getElementById('role').value, 
            points: 0,
            solves: 0,
            registered: new Date().toISOString()
        };
        
        if(users.find(u => u.username === newUser.username)) {
            showToast('Username already exists!', true);
            closeModal();
            return;
        }
        
        users.push(newUser);
        Database.saveUsers(users);
        loadSection('users');
        showToast(`${newUser.role === 'admin' ? 'Administrator' : 'Student'} added successfully! User will appear on scoreboard.`);
    }
    closeModal();
});

function syncToStudentPages() { syncAllUsers(); }
function exportAllData() {
    const data = { 
        homepage: Database.getHomepage(), 
        learnTopics: Database.getLearnTopics(), 
        challenges: Database.getChallenges(), 
        quizzes: Database.getQuizzes(), 
        jeopardy: Database.getJeopardy(), 
        users: Database.getUsers(), 
        submissions: Database.getSubmissions() 
    };
    const a = document.createElement('a'); 
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'})); 
    a.download = `ctf_backup_${new Date().toISOString().split('T')[0]}.json`; 
    a.click(); 
    URL.revokeObjectURL(a.href); 
    showToast('Export complete');
}
function importData() { document.getElementById('importFile').click(); }
function handleImport(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try { const d = JSON.parse(ev.target.result);
            if(d.homepage) Database.saveHomepage(d.homepage);
            if(d.learnTopics) Database.saveLearnTopics(d.learnTopics);
            if(d.challenges) Database.saveChallenges(d.challenges);
            if(d.quizzes) Database.saveQuizzes(d.quizzes);
            if(d.jeopardy) Database.saveJeopardy(d.jeopardy);
            if(d.users) Database.saveUsers(d.users);
            if(d.submissions) Database.saveSubmissions(d.submissions);
            loadSection(currentSection); 
            showToast('Import successful');
        } catch(err) { showToast('Import failed', true); }
    }; reader.readAsText(file); e.target.value = '';
}
function resetAllData() { if(confirm('RESET ALL DATA? This will delete everything!')) { localStorage.clear(); Database.init(); loadSection('dashboard'); showToast('All data reset'); } }

// Navigation
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', e => { e.preventDefault(); loadSection(item.getAttribute('data-section')); });
});

// Matrix Rain
(function matrix() {
    const cv = document.getElementById('matrixRain'); if(!cv) return;
    const cx = cv.getContext('2d'); const CHARS = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%'; let cols, drops;
    function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; cols = Math.floor(cv.width / 20); drops = Array.from({length: cols}, () => Math.random() * cv.height / 20 | 0); }
    resize(); window.addEventListener('resize', resize);
    function draw() { cx.fillStyle = 'rgba(10,10,10,.04)'; cx.fillRect(0, 0, cv.width, cv.height); cx.fillStyle = '#0f0'; cx.font = '14px monospace'; for(let i = 0; i < cols; i++) { cx.fillText(CHARS[Math.random() * CHARS.length | 0], i * 20, drops[i] * 20); if(drops[i] * 20 > cv.height && Math.random() > .975) drops[i] = 0; drops[i]++; } requestAnimationFrame(draw); }
    draw();
})();

Database.init();
loadSection('dashboard');

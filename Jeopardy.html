<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy - CTF Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== CYBERPUNK JEOPARDY STYLES ===== */
        :root {
            --neon-green: #50fa7b;
            --neon-blue: #3e9eff;
            --neon-cyan: #8be9fd;
            --neon-magenta: #ff79c6;
            --neon-purple: #bd93f9;
            --neon-yellow: #f1fa8c;
            --neon-red: #ff5555;
            --diff-beginner: #50fa7b;
            --diff-intermediate: #ffb86b;
            --diff-advanced: #ff5555;
            --bg-primary: #0a0e1a;
            --bg-secondary: #141b2b;
            --bg-panel: #141b2b;
            --bg-terminal: #0f1117;
            --bg-deep: #0a0c10;
            --border-color: #2a3550;
            --text-primary: #e0e0e0;
            --text-secondary: #8892b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', 'Share Tech Mono', monospace; overflow-x: hidden; }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
        }

        .navbar {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-green);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(80, 250, 123, 0.3);
            cursor: pointer;
        }

        .logo i { margin-right: 0.5rem; }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-green);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::before,
        .nav-links a.active::before {
            width: 100%;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--neon-green);
        }

        .logout-btn {
            background: rgba(255, 85, 85, 0.15);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: var(--neon-red);
            color: var(--bg-primary);
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.4);
        }

        .user-greeting {
            color: var(--neon-green);
            font-size: 0.85rem;
            margin-right: 0.5rem;
            background: rgba(80, 250, 123, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid rgba(80, 250, 123, 0.3);
        }

        /* Jeopardy Wrapper */
        .jeopardy-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .section-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .section-header p {
            color: var(--text-secondary);
        }

        /* Score Bar */
        .score-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            background: var(--bg-panel);
            border: 2px solid var(--neon-green);
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(80, 250, 123, 0.2);
        }

        .score-block {
            text-align: center;
            padding: 0.5rem 1rem;
            background: var(--bg-terminal);
            border-radius: 8px;
            min-width: 100px;
        }

        .score-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
        }

        .score-val {
            display: block;
            font-family: monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 12px var(--neon-green);
        }

        .score-val.cyan { color: var(--neon-cyan); text-shadow: 0 0 12px var(--neon-cyan); }
        .score-val.amber { color: var(--diff-intermediate); text-shadow: 0 0 12px var(--diff-intermediate); }

        /* Game Mode Selector */
        .game-mode-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--bg-terminal);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--neon-blue);
        }

        .game-mode-selector label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        #gameModeSelect {
            background: var(--bg-deep);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.3rem 0.8rem;
            font-family: monospace;
            cursor: pointer;
        }

        /* Board Controls */
        .board-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .reset-my-btn {
            background: transparent;
            border: 2px solid var(--neon-orange);
            color: var(--neon-orange);
            padding: 0.75rem 1.5rem;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 8px;
        }

        .reset-my-btn:hover {
            background: var(--neon-orange);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--neon-orange);
            transform: scale(1.05);
        }

        .btn-primary, .btn-secondary {
            background: transparent;
            border: 2px solid;
            padding: 0.75rem 1.5rem;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 8px;
        }

        .btn-primary {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        .btn-primary:hover {
            background: var(--neon-green);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--neon-green);
            transform: scale(1.05);
        }

        .btn-secondary {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        .btn-secondary:hover {
            background: var(--neon-blue);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.05);
        }

        /* Jeopardy Board Grid */
        .jeopardy-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 2rem;
        }

        /* Category Headers */
        .j-category {
            background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-terminal) 100%);
            border: 2px solid var(--neon-green);
            padding: 1rem 0.5rem;
            text-align: center;
            font-family: monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            min-height: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        .j-category i { font-size: 1.3rem; }
        .j-category.cat-web { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .j-category.cat-crypto { border-color: var(--neon-purple); color: var(--neon-purple); }
        .j-category.cat-network { border-color: var(--neon-blue); color: var(--neon-blue); }
        .j-category.cat-linux { border-color: var(--neon-green); color: var(--neon-green); }
        .j-category.cat-owasp { border-color: var(--neon-yellow); color: var(--neon-yellow); }
        .j-category.cat-incident { border-color: var(--neon-magenta); color: var(--neon-magenta); }

        /* Question Tiles */
        .j-tile {
            background: var(--bg-terminal);
            border: 2px solid rgba(0, 255, 157, 0.3);
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            font-family: monospace;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            border-radius: 8px;
        }

        .j-tile:hover:not(.answered-correct):not(.answered-wrong) {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(80, 250, 123, 0.4);
            border-color: var(--neon-green);
            z-index: 2;
        }

        .j-tile.answered-correct {
            background: rgba(80, 250, 123, 0.15);
            border-color: var(--neon-green);
            cursor: default;
            opacity: 0.7;
        }

        .j-tile.answered-wrong {
            background: rgba(255, 85, 85, 0.15);
            border-color: var(--neon-red);
            cursor: default;
            opacity: 0.7;
        }

        .j-tile.daily-double {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 15px var(--neon-yellow);
            position: relative;
        }

        .j-tile.daily-double::before {
            content: '★';
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 0.8rem;
            color: var(--neon-yellow);
        }

        /* Question Modal */
        .j-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .j-modal-overlay.open { display: flex; }

        .j-modal-box {
            background: var(--bg-terminal);
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 60px rgba(80, 250, 123, 0.3);
            width: 100%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            animation: modal-pop 0.25s ease;
            border-radius: 16px;
        }

        @keyframes modal-pop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .j-modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            color: var(--neon-red);
            cursor: pointer;
            transition: all 0.25s;
            z-index: 10;
        }

        .j-modal-close:hover {
            text-shadow: 0 0 15px var(--neon-red);
            transform: rotate(90deg);
        }

        .j-question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--neon-green);
        }

        .j-category-label {
            background: rgba(62, 158, 255, 0.1);
            border: 1px solid var(--neon-blue);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
        }

        .j-points-label {
            font-family: monospace;
            font-size: 1.8rem;
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
        }

        .j-timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 1rem 0 0.5rem;
        }

        .j-timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan), var(--neon-yellow));
            border-radius: 3px;
            transition: width 1s linear;
        }

        .j-question-text {
            font-size: 1.2rem;
            color: var(--text-primary);
            line-height: 1.6;
            margin: 1.5rem 0;
            background: var(--bg-deep);
            border-left: 4px solid var(--neon-magenta);
            padding: 1.2rem;
            border-radius: 8px;
        }

        /* Multiple Choice Options */
        .j-mc-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .j-mc-btn {
            background: var(--bg-deep);
            border: 2px solid var(--neon-blue);
            color: var(--text-primary);
            padding: 1rem;
            text-align: left;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-radius: 8px;
        }

        .j-mc-btn:hover:not(:disabled) {
            border-color: var(--neon-green);
            transform: translateX(8px);
            box-shadow: 0 0 15px rgba(80, 250, 123, 0.2);
        }

        .j-mc-btn.correct {
            border-color: var(--neon-green);
            background: rgba(80, 250, 123, 0.1);
            color: var(--neon-green);
        }

        .j-mc-btn.wrong {
            border-color: var(--neon-red);
            background: rgba(255, 85, 85, 0.1);
            color: var(--neon-red);
        }

        .option-letter {
            font-weight: 700;
            color: var(--neon-cyan);
            font-size: 1.1rem;
        }

        /* Flag Input */
        .j-flag-row {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .j-flag-row input {
            flex: 1;
            background: var(--bg-deep);
            border: 2px solid var(--neon-blue);
            color: var(--neon-green);
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            border-radius: 8px;
        }

        .j-flag-row input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(80, 250, 123, 0.3);
        }

        /* Result Banner */
        .j-result {
            display: none;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .j-result.correct {
            background: rgba(80, 250, 123, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }

        .j-result.wrong {
            background: rgba(255, 85, 85, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
        }

        .what-learned {
            background: rgba(80, 250, 123, 0.05);
            border-left: 4px solid var(--neon-green);
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 8px;
        }

        /* Final Modal */
        .j-final-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .j-final-stat {
            text-align: center;
            padding: 1rem;
            background: var(--bg-deep);
            border-radius: 8px;
        }

        .j-final-stat .val {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-green);
        }

        .j-final-stat .lbl {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .j-cat-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
        }

        .cat-name {
            width: 100px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .j-cat-bar-track {
            flex: 1;
            height: 8px;
            background: var(--bg-deep);
            border-radius: 4px;
            overflow: hidden;
        }

        .j-cat-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 10001;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .jeopardy-board { gap: 4px; }
            .j-tile, .j-category { min-height: 65px; font-size: 0.9rem; }
            .j-category i { font-size: 1rem; }
            .score-bar { flex-direction: column; align-items: stretch; }
            .score-block { text-align: center; }
            .j-final-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .jeopardy-board { grid-template-columns: repeat(3, 1fr); }
            .j-category { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<nav class="navbar">
    <div class="logo" onclick="navigateTo('homepage.html')">
        <i class="fas fa-shield-alt"></i>
        UTECH CTF HUB
    </div>
    <ul class="nav-links">
        <li><a onclick="navigateTo('homepage.html')">Home</a></li>
        <li><a onclick="navigateTo('CTF learning material.html')">Learn</a></li>
        <li><a onclick="navigateTo('CTF challenge.html')">Challenges</a></li>
        <li><a class="active">Jeopardy</a></li>
        <li><a onclick="navigateTo('CTF scoreboard.html')">Scoreboard</a></li>
        <li id="authContainer" style="display: flex; align-items: center; gap: 0.8rem;"></li>
    </ul>
</nav>

<main class="jeopardy-wrapper">
    <div class="section-header">
        <h1><i class="fas fa-puzzle-piece"></i> Jeopardy Challenge</h1>
        <p>Pick a category and point value — test your cybersecurity knowledge</p>
    </div>

    <!-- Score Bar -->
    <div class="score-bar">
        <div class="score-block">
            <span class="score-label"><i class="fas fa-star"></i> My Score</span>
            <span class="score-val" id="jScore">0</span>
        </div>
        <div class="score-block">
            <span class="score-label"><i class="fas fa-check-circle"></i> Answered</span>
            <span class="score-val cyan" id="jAnswered">0 / 30</span>
        </div>
        <div class="score-block">
            <span class="score-label"><i class="fas fa-check-double"></i> Correct</span>
            <span class="score-val" id="jCorrect">0</span>
        </div>
        <div class="score-block">
            <span class="score-label"><i class="fas fa-hourglass-half"></i> Remaining</span>
            <span class="score-val amber" id="jRemaining">30</span>
        </div>
        <div class="game-mode-selector">
            <label><i class="fas fa-gamepad"></i> Mode:</label>
            <select id="gameModeSelect">
                <option value="mc">Multiple Choice</option>
                <option value="flag">Flag Input</option>
            </select>
        </div>
    </div>

    <!-- Controls -->
    <div class="board-controls">
        <button class="reset-my-btn" onclick="resetMyProgress()">
            <i class="fas fa-user-slash"></i> Reset My Progress
        </button>
        <button class="btn-primary" onclick="newGame()">
            <i class="fas fa-random"></i> New Game
        </button>
        <button class="btn-secondary" onclick="showFinalScore()">
            <i class="fas fa-trophy"></i> Final Score
        </button>
        <span style="color: var(--text-secondary); font-size: 0.8rem; margin-left: auto;">
            <i class="fas fa-info-circle"></i>
            Daily Double ★ = Double Points
        </span>
    </div>

    <!-- Jeopardy Board -->
    <div class="jeopardy-board" id="jeopardyBoard"></div>
</main>

<!-- Question Modal -->
<div class="j-modal-overlay" id="questionModal">
    <div class="j-modal-box">
        <div class="j-modal-close" onclick="closeQuestion()">✕</div>
        <div id="questionContent"></div>
    </div>
</div>

<!-- Final Score Modal -->
<div class="j-modal-overlay" id="finalModal">
    <div class="j-modal-box" id="finalContent"></div>
</div>

<script>
// Matrix Rain Effect
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*";
let drops = [];
function initDrops() { drops = []; for(let i=0; i<canvas.width/14; i++) drops[i]=Math.random()*canvas.height; }
initDrops();
function drawMatrix() {
    if(!ctx) return;
    ctx.fillStyle = 'rgba(10,10,10,0.04)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#50fa7b';
    ctx.font = '14px monospace';
    for(let i=0;i<drops.length;i++) {
        ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, drops[i]*14);
        if(drops[i]*14 > canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix,35);
window.addEventListener('resize',()=>{ resizeCanvas(); initDrops(); });

// Database Keys
const DB_KEYS = {
    USERS: 'ctf_users',
    SUBMISSIONS: 'ctf_db_submissions',
    USER_POINTS: 'ctf_user_points',

// Auth Functions
function getCurrentUser() {
    const user = localStorage.getItem('user') || sessionStorage.getItem('user');
    if(user) { try { return JSON.parse(user); } catch(e) { return null; } }
    return null;
}

function navigateTo(page) { window.location.href = page; }

function showToast(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderColor = isError ? '#ff5555' : '#50fa7b';
    toast.style.color = isError ? '#ff5555' : '#50fa7b';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function updateAuthUI() {
    const authContainer = document.getElementById('authContainer');
    if(!authContainer) return;
    const user = getCurrentUser();
    if(user && user.username) {
        authContainer.innerHTML = `
            <span class="user-greeting"><i class="fas fa-user-astronaut"></i> ${escapeHtml(user.username)}</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        `;
    } else {
        authContainer.innerHTML = `<a href="login.html" style="display:flex; align-items:center; gap:0.5rem;"><i class="fas fa-sign-in-alt"></i> Login</a>`;
    }
}

function logout() {
    localStorage.removeItem('user');
    sessionStorage.removeItem('user');
    showToast('Logged out successfully');
    setTimeout(() => window.location.href = 'login.html', 1000);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function getStudentJeopardyState() {
    const user = getCurrentUser();
    if (!user) return null;
    const key = DB_KEYS.STUDENT_JEOPARDY(user.username);
    try {
        return JSON.parse(localStorage.getItem(key)) || {
            answered: {},
            score: 0,
            correct: 0,
            catScores: {}
        };
    } catch(e) { 
        return { answered: {}, score: 0, correct: 0, catScores: {} };
    }
}

function saveStudentJeopardyState(state) {
    const user = getCurrentUser();
    if (!user) return;
    const key = DB_KEYS.STUDENT_JEOPARDY(user.username);
    localStorage.setItem(key, JSON.stringify(state));
}

function clearStudentJeopardyState() {
    const user = getCurrentUser();
    if (!user) return;
    const key = DB_KEYS.STUDENT_JEOPARDY(user.username);
    localStorage.removeItem(key);
}

// ================================================================
// GAME STATE (local for current session)
// ================================================================
let currentState = {
    answered: {},
    score: 0,
    correct: 0,
    catScores: {}
};

let currentQuestion = null;
let timerInterval = null;
let currentMode = 'mc';

function loadState() {
    const saved = getStudentJeopardyState();
    if (saved) {
        currentState = saved;
    }
}

function saveState() {
    saveStudentJeopardyState(currentState);
    updateStats();
}

function updateStats() {
    const total = questions.length;
    const answered = Object.keys(currentState.answered).length;
    const remaining = total - answered;

    document.getElementById('jScore').textContent = currentState.score;
    document.getElementById('jAnswered').textContent = answered + ' / ' + total;
    document.getElementById('jCorrect').textContent = currentState.correct;
    document.getElementById('jRemaining').textContent = remaining;
}

function renderBoard() {
    const board = document.getElementById('jeopardyBoard');
    if (!board) return;
    board.innerHTML = '';

    // Category headers
    CATEGORIES.forEach(cat => {
        const header = document.createElement('div');
        header.className = `j-category cat-${cat.key}`;
        header.innerHTML = `<i class="fas ${cat.icon}"></i><span>${cat.label}</span>`;
        board.appendChild(header);
    });

    // Point value rows
    POINT_VALUES.forEach(pts => {
        CATEGORIES.forEach(cat => {
            const q = questions.find(x => x.catKey === cat.key && x.points === pts);
            if (!q) return;

            const tile = document.createElement('div');
            tile.className = 'j-tile';
            tile.dataset.id = q.id;
            tile.dataset.points = pts;

            if (q.dailyDouble) tile.classList.add('daily-double');

            const status = currentState.answered[q.id];
            if (status === 'correct') {
                tile.classList.add('answered-correct');
                tile.innerHTML = `<span>✓</span>`;
            } else if (status === 'wrong') {
                tile.classList.add('answered-wrong');
                tile.innerHTML = `<span>✗</span>`;
            } else {
                tile.innerHTML = `<span>${pts}</span>`;
                tile.addEventListener('click', () => openQuestion(q.id));
            }
            board.appendChild(tile);
        });
    });
    updateStats();
}

function openQuestion(id) {
    const q = questions.find(x => x.id === id);
    if (!q) return;

    if (currentState.answered[q.id]) {
        showToast('Question already answered!', true);
        return;
    }

    currentMode = document.getElementById('gameModeSelect')?.value || 'mc';
    currentQuestion = q;

    const modal = document.getElementById('questionModal');
    const content = document.getElementById('questionContent');
    const isDailyDouble = !!q.dailyDouble;
    const timerSeconds = { 100: 30, 200: 30, 300: 45, 400: 60, 500: 90 }[q.points] || 45;

    content.innerHTML = `
        <div class="j-question-header">
            <div>
                <div class="j-category-label">${q.category}</div>
                ${isDailyDouble ? `<div style="color:var(--neon-yellow);font-size:0.75rem;margin-top:0.35rem;">★ DAILY DOUBLE (2x Points)</div>` : ''}
            </div>
            <div class="j-points-label">$${q.points}</div>
        </div>
        <div class="j-timer-bar">
            <div class="j-timer-fill" id="timerFill" style="width:100%;"></div>
        </div>
        <p style="text-align:right;font-size:0.75rem;color:var(--text-secondary);margin-bottom:1rem;">
            <i class="fas fa-clock"></i> <span id="timerText">${timerSeconds}s</span>
        </p>
        <p class="j-question-text">${q.question}</p>
        <div id="answerArea"></div>
        <div class="j-result" id="jResult">
            <i class="fas fa-circle" id="jResultIcon"></i>
            <span id="jResultText"></span>
        </div>
        <div id="explanationBox" class="what-learned" style="display:none;">
            <h3><i class="fas fa-graduation-cap"></i> What You'll Learn</h3>
            <p>${q.explanation}</p>
        </div>
        <button class="btn-primary" id="nextBtn" style="display:none;margin-top:1rem;width:100%;" onclick="closeQuestion()">
            <i class="fas fa-arrow-right"></i> Continue
        </button>
    `;

    if (currentMode === 'mc') {
        renderMCOptions(q);
    } else {
        renderFlagInput(q);
    }

    modal.classList.add('open');
    startTimer(timerSeconds);
}

function renderMCOptions(q) {
    const letters = ['A', 'B', 'C', 'D'];
    const area = document.getElementById('answerArea');
    area.innerHTML = `<div class="j-mc-options" id="mcOptions">
        ${q.options.map((opt, i) => `
            <button class="j-mc-btn" data-idx="${i}" onclick="submitMC(${i})">
                <span class="option-letter">${letters[i]}.</span>${opt}
            </button>
        `).join('')}
    </div>`;
}

function renderFlagInput(q) {
    const area = document.getElementById('answerArea');
    area.innerHTML = `
        <div class="j-flag-row">
            <input type="text" id="flagInput" placeholder="flag{...}" onkeypress="if(event.key==='Enter') submitFlag()">
            <button class="btn-primary" onclick="submitFlag()" style="margin:0;padding:0.75rem 1.5rem;">Submit</button>
        </div>
    `;
}

function submitMC(selectedIdx) {
    const q = currentQuestion;
    const btns = document.querySelectorAll('.j-mc-btn');
    stopTimer();

    btns.forEach(btn => {
        btn.disabled = true;
        const idx = parseInt(btn.dataset.idx);
        if (idx === q.correct) btn.classList.add('correct');
        else if (idx === selectedIdx && idx !== q.correct) btn.classList.add('wrong');
    });

    const isCorrect = selectedIdx === q.correct;
    resolveAnswer(isCorrect);
}

function submitFlag() {
    const q = currentQuestion;
    const input = document.getElementById('flagInput');
    if (!input) return;

    const submitted = input.value.trim().toLowerCase();
    const correct = q.flag.toLowerCase();
    stopTimer();

    input.disabled = true;
    resolveAnswer(submitted === correct);
}

function resolveAnswer(isCorrect) {
    const q = currentQuestion;
    const isDailyDouble = !!q.dailyDouble;
    const pointsEarned = isCorrect ? (isDailyDouble ? q.points * 2 : q.points) : 0;

    const resultEl = document.getElementById('jResult');
    const resultTx = document.getElementById('jResultText');
    const resultIc = document.getElementById('jResultIcon');
    const explBox = document.getElementById('explanationBox');
    const nextBtn = document.getElementById('nextBtn');

    resultEl.style.display = 'flex';

    if (isCorrect) {
        currentState.score += pointsEarned;
        currentState.correct += 1;
        currentState.catScores[q.catKey] = (currentState.catScores[q.catKey] || 0) + pointsEarned;
        currentState.answered[q.id] = 'correct';

        resultEl.className = 'j-result correct';
        resultIc.className = 'fas fa-check-circle';
        resultTx.textContent = `Correct! +${pointsEarned} points${isDailyDouble ? ' (Daily Double!)' : ''}`;
        
        // Save to user's global points
        saveToUser(pointsEarned);
        recordToSubmissions(q.id, q.category, pointsEarned);
    } else {
        resultEl.className = 'j-result wrong';
        resultIc.className = 'fas fa-times-circle';
        const correctAnswer = q.options ? q.options[q.correct] : q.flag;
        resultTx.textContent = `Incorrect. Correct answer: "${correctAnswer}"`;
        currentState.answered[q.id] = 'wrong';
    }

    explBox.style.display = 'block';
    nextBtn.style.display = 'block';
    saveState();
}

function timeExpired() {
    const q = currentQuestion;
    const btns = document.querySelectorAll('.j-mc-btn');
    btns.forEach(btn => btn.disabled = true);
    const input = document.getElementById('flagInput');
    if (input) input.disabled = true;

    const resultEl = document.getElementById('jResult');
    const resultTx = document.getElementById('jResultText');
    const resultIc = document.getElementById('jResultIcon');

    resultEl.style.display = 'flex';
    resultEl.className = 'j-result wrong';
    resultIc.className = 'fas fa-hourglass-end';
    resultTx.textContent = `Time's up! Correct: "${q.options ? q.options[q.correct] : q.flag}"`;
    currentState.answered[q.id] = 'wrong';

    document.getElementById('explanationBox').style.display = 'block';
    document.getElementById('nextBtn').style.display = 'block';
    saveState();
}

function startTimer(seconds) {
    stopTimer();
    let remaining = seconds;
    const fill = document.getElementById('timerFill');
    const text = document.getElementById('timerText');

    timerInterval = setInterval(() => {
        remaining--;
        if (fill) fill.style.width = (remaining / seconds * 100) + '%';
        if (text) text.textContent = remaining + 's';

        if (remaining <= 0) {
            stopTimer();
            if (!currentState.answered[currentQuestion?.id]) timeExpired();
        }
    }, 1000);
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function closeQuestion() {
    stopTimer();
    document.getElementById('questionModal').classList.remove('open');
    renderBoard();
}

function showFinalScore() {
    const total = questions.length;
    const answered = Object.keys(currentState.answered).length;
    const pct = answered ? Math.round((currentState.correct / answered) * 100) : 0;
    const maxPts = questions.reduce((s, q) => s + q.points, 0);

    const catRows = CATEGORIES.map(cat => {
        const catQs = questions.filter(q => q.catKey === cat.key);
        const maxCat = catQs.reduce((s, q) => s + q.points, 0);
        const earned = currentState.catScores[cat.key] || 0;
        const pctCat = maxCat ? Math.round((earned / maxCat) * 100) : 0;
        const color = pctCat >= 70 ? 'var(--neon-green)' : pctCat >= 40 ? 'var(--neon-yellow)' : 'var(--neon-red)';
        return `
            <div class="j-cat-row">
                <span class="cat-name">${cat.label}</span>
                <div class="j-cat-bar-track"><div class="j-cat-bar-fill" style="width:${pctCat}%;background:${color};"></div></div>
                <span style="color:var(--neon-green);">${earned}</span>
            </div>`;
    }).join('');

    const rank = currentState.score >= 2000 ? '🏆 Elite Hacker' : currentState.score >= 1200 ? '⚡ Advanced' : currentState.score >= 600 ? '🔧 Intermediate' : '🌱 Beginner';

    const finalContent = document.getElementById('finalContent');
    finalContent.innerHTML = `
        <div style="text-align:center;margin-bottom:1.5rem;">
            <h2 style="color:var(--neon-green);">Final Score</h2>
            <p style="font-size:3rem;font-family:monospace;color:var(--neon-green);text-shadow:0 0 20px var(--neon-green);">${currentState.score}</p>
            <p style="color:var(--neon-cyan);font-size:1.1rem;">${rank}</p>
        </div>
        <div class="j-final-grid">
            <div class="j-final-stat"><span class="val">${currentState.correct}</span><span class="lbl">Correct</span></div>
            <div class="j-final-stat"><span class="val">${answered - currentState.correct}</span><span class="lbl">Wrong</span></div>
            <div class="j-final-stat"><span class="val">${pct}%</span><span class="lbl">Accuracy</span></div>
            <div class="j-final-stat"><span class="val">${maxPts - currentState.score}</span><span class="lbl">Left</span></div>
        </div>
        <div style="margin:1.5rem 0;"><p style="color:var(--neon-cyan);margin-bottom:1rem;">Category Breakdown</p>${catRows}</div>
        <button class="btn-primary" onclick="closeFinalModal()" style="width:100%;">Close</button>
    `;
    document.getElementById('finalModal').classList.add('open');
}

function closeFinalModal() {
    document.getElementById('finalModal').classList.remove('open');
}

function newGame() {
    if (confirm('Start a new game? This will reset all your jeopardy progress!')) {
        clearStudentJeopardyState();
        currentState = { answered: {}, score: 0, correct: 0, catScores: {} };
        renderBoard();
        showToast('New game started!');
    }
}

function resetMyProgress() {
    if (confirm('⚠️ This will reset ALL your jeopardy progress and points earned. This action cannot be undone!')) {
        const user = getCurrentUser();
        if (user) {
            clearStudentJeopardyState();
            currentState = { answered: {}, score: 0, correct: 0, catScores: {} };
            
            // Remove jeopardy submissions from global records
            let submissions = JSON.parse(localStorage.getItem(DB_KEYS.SUBMISSIONS) || '[]');
            submissions = submissions.filter(s => !(s.userName === user.username && s.type === 'jeopardy'));
            localStorage.setItem(DB_KEYS.SUBMISSIONS, JSON.stringify(submissions));
            
            // Remove jeopardy points from user points
            let pointsData = JSON.parse(localStorage.getItem(DB_KEYS.USER_POINTS) || '{}');
            if (pointsData[user.username]) {
                pointsData[user.username].jeopardy = {};
                pointsData[user.username].total = Object.values(pointsData[user.username].challenges || {}).reduce((sum, c) => sum + (c.points || 0), 0) +
                    Object.values(pointsData[user.username].quizzes || {}).reduce((sum, q) => sum + (q.points || 0), 0);
                pointsData[user.username].lastUpdated = Date.now();
                localStorage.setItem(DB_KEYS.USER_POINTS, JSON.stringify(pointsData));
            }
            
            // Update user's total points
            const users = JSON.parse(localStorage.getItem(DB_KEYS.USERS) || '{}');
            if (users[user.username]) {
                users[user.username].points = pointsData[user.username]?.total || 0;
                localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users));
            }
            
            // Update session
            const sessionUser = getCurrentUser();
            if (sessionUser) {
                sessionUser.points = users[user.username]?.points || 0;
                if (sessionStorage.getItem('user')) {
                    sessionStorage.setItem('user', JSON.stringify(sessionUser));
                } else {
                    localStorage.setItem('user', JSON.stringify(sessionUser));
                }
            }
            
            renderBoard();
            showToast('Your jeopardy progress has been reset!');
        }
    }
}

function saveToUser(pts) {
    const user = getCurrentUser();
    if (!user) return;
    const raw = localStorage.getItem('user') || sessionStorage.getItem('user');
    if (raw) {
        const userObj = JSON.parse(raw);
        userObj.points = (userObj.points || 0) + pts;
        const store = localStorage.getItem('user') ? localStorage : sessionStorage;
        store.setItem('user', JSON.stringify(userObj));
    }
}

function recordToSubmissions(questionId, category, points) {
    const user = getCurrentUser();
    if (!user) return;
    
    let submissions = JSON.parse(localStorage.getItem(DB_KEYS.SUBMISSIONS) || '[]');
    const submission = {
        id: Date.now(),
        userId: user.id || Date.now(),
        userName: user.username,
        questionId: questionId,
        category: category,
        points: points,
        type: 'jeopardy',
        time: new Date().toISOString(),
        timestamp: Date.now()
    };
    
    submissions.push(submission);
    localStorage.setItem(DB_KEYS.SUBMISSIONS, JSON.stringify(submissions));
    
    // Update user points
    let pointsData = JSON.parse(localStorage.getItem(DB_KEYS.USER_POINTS) || '{}');
    if (!pointsData[user.username]) {
        pointsData[user.username] = { total: 0, challenges: {}, quizzes: {}, jeopardy: {}, lastUpdated: Date.now() };
    }
    pointsData[user.username].total += points;
    pointsData[user.username].jeopardy[questionId] = { points: points, completedAt: Date.now() };
    pointsData[user.username].lastUpdated = Date.now();
    localStorage.setItem(DB_KEYS.USER_POINTS, JSON.stringify(pointsData));
}

// Make functions globally accessible
window.openQuestion = openQuestion;
window.closeQuestion = closeQuestion;
window.submitMC = submitMC;
window.submitFlag = submitFlag;
window.showFinalScore = showFinalScore;
window.closeFinalModal = closeFinalModal;
window.newGame = newGame;
window.resetMyProgress = resetMyProgress;
window.navigateTo = navigateTo;

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    updateAuthUI();
    if (getCurrentUser()) {
        loadState();
        renderBoard();
    }
});
</script>

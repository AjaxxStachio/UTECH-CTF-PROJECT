<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes - CTF Hub</title>
    <link rel="stylesheet" href="Theme.css">
    <style>

/* ═══════════════════════════════════════════════════════════
   QUIZ SHELL
═══════════════════════════════════════════════════════════ */
.quiz-shell {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem;
    min-height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; animation: fade-in 0.35s ease; }
@keyframes fade-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════════════════ */
.home-header {
    text-align: center;
    margin-bottom: 2.5rem;
}

.home-header .tagline {
    color: var(--text-secondary);
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 0.25rem;
}

/* reset button */
.reset-all-btn {
    background: transparent;
    border: 2px solid var(--neon-orange);
    color: var(--neon-orange);
    padding: 0.5rem 1.2rem;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.reset-all-btn:hover {
    background: var(--neon-orange);
    color: var(--bg-deep);
    box-shadow: 0 0 20px var(--neon-orange);
}

/* global stats strip */
.global-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
}

.g-stat {
    background: var(--bg-panel);
    border: 1px solid rgba(0,255,157,0.18);
    padding: 1rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s;
}
.g-stat:hover { border-color: var(--neon-green); }
.g-stat::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        45deg, transparent, transparent 12px,
        rgba(0,255,157,0.03) 12px, rgba(0,255,157,0.03) 24px
    );
}
.g-stat .g-val {
    display: block;
    font-family: 'Orbitron', monospace;
    font-size: 1.7rem;
    color: var(--neon-green);
    text-shadow: 0 0 12px var(--neon-green);
    position: relative;
}
.g-stat .g-lbl {
    display: block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-top: 0.2rem;
    position: relative;
}

/* quiz category cards - 3x3 grid */
.quiz-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.25rem;
}

.quiz-card {
    background: var(--bg-panel);
    border: 1px solid rgba(0,255,157,0.2);
    border-radius: 2px;
    padding: 0;
    cursor: pointer;
    transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    position: relative;
}

.quiz-card::before {          /* animated left accent bar */
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent, var(--neon-green));
    transition: width 0.25s ease;
}
.quiz-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,157,0.15); border-color: var(--accent, var(--neon-green)); }
.quiz-card:hover::before { width: 5px; }

.qc-top {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.qc-icon {
    font-size: 2.2rem;
    margin-bottom: 0.85rem;
    display: block;
}
.qc-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-primary);
    margin-bottom: 0.35rem;
}
.qc-desc {
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.5;
}

.qc-bottom {
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.qc-meta {
    font-size: 0.7rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
}
.qc-progress-wrap {
    flex: 1;
    margin: 0 0.85rem;
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
}
.qc-progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent, var(--neon-green));
    transition: width 0.6s ease;
    box-shadow: 0 0 6px var(--accent, var(--neon-green));
}
.qc-pct {
    font-size: 0.72rem;
    font-family: 'Orbitron', monospace;
    color: var(--accent, var(--neon-green));
}

/* star rating row */
.qc-stars {
    display: flex;
    gap: 3px;
}
.qc-stars i { font-size: 0.75rem; color: rgba(255,255,255,0.15); }
.qc-stars i.lit { color: var(--neon-yellow); text-shadow: 0 0 6px var(--neon-yellow); }

/* badge for completed */
.qc-badge {
    position: absolute;
    top: 0.7rem; right: 0.7rem;
    font-size: 0.62rem;
    font-family: 'Orbitron', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.18rem 0.55rem;
    border: 1px solid;
    border-radius: 1px;
}
.qc-badge.done { color: var(--diff-beginner); border-color: var(--diff-beginner); }
.qc-badge.lock { color: var(--text-secondary); border-color: rgba(255,255,255,0.1); }


/* ═══════════════════════════════════════════════════════════
   QUIZ SCREEN
═══════════════════════════════════════════════════════════ */
.quiz-topbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.75rem;
}

.quit-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text-secondary);
    padding: 0.4rem 0.75rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    flex-shrink: 0;
}
.quit-btn:hover { border-color: var(--neon-red); color: var(--neon-red); }

/* top progress bar */
.top-progress-track {
    flex: 1;
    height: 7px;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
}
.top-progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
    transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(0,255,157,0.5);
}

.q-counter {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    color: var(--text-secondary);
    white-space: nowrap;
}

/* streak + lives row */
.quiz-meta-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.75rem;
}

.streak-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Orbitron', monospace;
    font-size: 0.82rem;
}
.streak-badge i { color: var(--neon-yellow); }
.streak-badge span { color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }

.lives-row {
    display: flex;
    gap: 0.3rem;
    margin-left: auto;
}
.life-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--neon-red);
    box-shadow: 0 0 8px var(--neon-red);
    transition: all 0.3s;
}
.life-dot.lost {
    background: rgba(255,255,255,0.1);
    box-shadow: none;
}

/* category label */
.q-category-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.68rem;
    font-family: 'Orbitron', monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 0.25rem 0.75rem;
    border: 1px solid;
    margin-bottom: 1.25rem;
}

/* QUESTION CARD */
.question-card {
    background: var(--bg-panel);
    border: 1px solid rgba(0,255,157,0.15);
    padding: 2rem;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
    animation: card-in 0.3s ease;
}
@keyframes card-in {
    from { opacity:0; transform: scale(0.97) translateY(8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
}

/* top-left question number glyph */
.question-card::before {
    content: attr(data-num);
    position: absolute;
    top: -0.5rem; left: -0.5rem;
    font-family: 'Orbitron', monospace;
    font-size: 5rem;
    font-weight: 900;
    color: rgba(0,255,157,0.04);
    line-height: 1;
    pointer-events: none;
    user-select: none;
}

.question-text {
    font-size: 1.12rem;
    color: var(--text-primary);
    line-height: 1.7;
    font-family: 'Share Tech Mono', monospace;
    margin: 0;
}

/* code snippet inside question */
.question-text code {
    background: var(--bg-deep);
    border: 1px solid rgba(0,243,255,0.3);
    color: var(--neon-cyan);
    padding: 0.15rem 0.45rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95em;
    border-radius: 2px;
}

/* OPTIONS */
.options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
}

.option-btn {
    background: var(--bg-terminal);
    border: 2px solid rgba(0,243,255,0.2);
    color: var(--text-primary);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.92rem;
    padding: 1rem 1.1rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    line-height: 1.45;
    position: relative;
    overflow: hidden;
}

.option-btn::before {        /* hover shimmer */
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,243,255,0.06);
    opacity: 0;
    transition: opacity 0.2s;
}
.option-btn:hover:not(:disabled)::before { opacity: 1; }
.option-btn:hover:not(:disabled) {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    transform: translateX(3px);
    box-shadow: -3px 0 0 var(--neon-cyan);
}

.opt-letter {
    font-family: 'Orbitron', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    width: 24px; height: 24px;
    border: 1.5px solid;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
}

/* answer states */
.option-btn.correct {
    border-color: var(--diff-beginner) !important;
    background: rgba(80,250,123,0.12) !important;
    color: var(--diff-beginner) !important;
    animation: correct-pop 0.45s ease;
}
.option-btn.correct .opt-letter {
    background: var(--diff-beginner);
    border-color: var(--diff-beginner);
    color: var(--bg-deep);
}
@keyframes correct-pop {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.03); }
    100% { transform: scale(1); }
}

.option-btn.wrong {
    border-color: var(--diff-advanced) !important;
    background: rgba(255,85,85,0.10) !important;
    color: var(--diff-advanced) !important;
    animation: wrong-shake 0.4s ease;
}
.option-btn.wrong .opt-letter {
    background: var(--diff-advanced);
    border-color: var(--diff-advanced);
    color: var(--bg-deep);
}
@keyframes wrong-shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
}

.option-btn.reveal-correct {
    border-color: rgba(80,250,123,0.4) !important;
    background: rgba(80,250,123,0.06) !important;
    color: var(--diff-beginner) !important;
}

.option-btn:disabled { cursor: default; transform: none !important; box-shadow: none !important; }
.option-btn:disabled::before { display: none; }

/* FEEDBACK BANNER */
.feedback-banner {
    display: none;
    padding: 1.1rem 1.5rem;
    border-left: 4px solid;
    margin-bottom: 1rem;
    animation: banner-slide 0.3s ease;
}
@keyframes banner-slide {
    from { opacity:0; transform: translateY(-8px); }
    to   { opacity:1; transform: translateY(0); }
}
.feedback-banner.show { display: block; }
.feedback-banner.correct-fb {
    background: rgba(80,250,123,0.08);
    border-color: var(--diff-beginner);
}
.feedback-banner.wrong-fb {
    background: rgba(255,85,85,0.08);
    border-color: var(--diff-advanced);
}

.fb-heading {
    font-family: 'Orbitron', monospace;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 0.35rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.feedback-banner.correct-fb .fb-heading { color: var(--diff-beginner); }
.feedback-banner.wrong-fb  .fb-heading  { color: var(--diff-advanced); }
.fb-text {
    font-size: 0.88rem;
    color: var(--text-secondary);
    line-height: 1.6;
}
.fb-text strong { color: var(--text-primary); }

/* NEXT BUTTON */
.next-btn {
    width: 100%;
    padding: 1rem;
    background: var(--neon-green);
    border: none;
    color: var(--bg-deep);
    font-family: 'Orbitron', monospace;
    font-size: 0.88rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    cursor: pointer;
    display: none;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
}
.next-btn.show { display: block; animation: fade-in 0.25s ease; }
.next-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width 0.5s, height 0.5s;
}
.next-btn:hover::before { width: 300px; height: 300px; }
.next-btn:hover { box-shadow: 0 0 30px var(--neon-green); }


/* ═══════════════════════════════════════════════════════════
   RESULTS SCREEN
═══════════════════════════════════════════════════════════ */
.results-card {
    background: var(--bg-panel);
    border: 2px solid var(--neon-green);
    box-shadow: 0 0 60px rgba(0,255,157,0.15);
    padding: 2.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 2rem;
}

/* animated corner glows */
.results-card::before, .results-card::after {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.25;
}
.results-card::before { top:-30px; left:-30px; background: var(--neon-green); }
.results-card::after  { bottom:-30px; right:-30px; background: var(--neon-cyan); }

.result-emoji {
    font-size: 3.5rem;
    margin-bottom: 0.5rem;
    animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
    display: block;
}
@keyframes pop-in {
    from { transform: scale(0); opacity:0; }
    to   { transform: scale(1); opacity:1; }
}

.result-grade {
    font-family: 'Orbitron', monospace;
    font-size: 3.5rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 0.25rem;
    background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    animation: fade-in 0.5s 0.1s both ease;
}

.result-label {
    color: var(--text-secondary);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 2rem;
    animation: fade-in 0.5s 0.2s both ease;
}

/* big score circle */
.score-ring-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 2rem;
    animation: fade-in 0.5s 0.2s both ease;
}
.score-ring-svg { transform: rotate(-90deg); }
.score-ring-bg { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 10; }
.score-ring-fill {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 408;
    stroke-dashoffset: 408;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
}
.score-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.score-ring-text .score-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--neon-green);
    text-shadow: 0 0 15px var(--neon-green);
    line-height: 1;
}
.score-ring-text .score-den {
    font-size: 0.72rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* result stats grid */
.result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
    animation: fade-in 0.5s 0.3s both ease;
}

.r-stat {
    background: var(--bg-deep);
    border: 1px solid rgba(255,255,255,0.07);
    padding: 0.9rem 0.5rem;
}
.r-stat .r-val {
    display: block;
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    margin-bottom: 0.2rem;
}
.r-stat .r-lbl {
    display: block;
    font-size: 0.65rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
}
.r-stat.correct .r-val { color: var(--diff-beginner); text-shadow: 0 0 10px var(--diff-beginner); }
.r-stat.wrong   .r-val { color: var(--diff-advanced);  text-shadow: 0 0 10px var(--diff-advanced); }
.r-stat.acc     .r-val { color: var(--neon-cyan);      text-shadow: 0 0 10px var(--neon-cyan); }

/* per-question review list */
.review-list {
    text-align: left;
    margin-bottom: 2rem;
    animation: fade-in 0.5s 0.4s both ease;
}

.review-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.review-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.65rem 0.85rem;
    border-left: 3px solid;
    margin-bottom: 0.5rem;
    background: var(--bg-deep);
    font-size: 0.83rem;
    line-height: 1.4;
}
.review-item.r-correct { border-color: var(--diff-beginner); }
.review-item.r-wrong   { border-color: var(--diff-advanced); }
.review-item .r-icon   { flex-shrink: 0; margin-top: 1px; }
.review-item .r-q      { color: var(--text-secondary); }
.review-item .r-a      { color: var(--text-primary); font-size:0.78rem; margin-top:0.2rem; }

/* result action buttons */
.result-actions {
    display: flex;
    gap: 0.85rem;
    animation: fade-in 0.5s 0.5s both ease;
}

.ra-btn {
    flex: 1;
    padding: 0.85rem;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.25s;
    border: 2px solid;
    background: transparent;
}
.ra-btn.primary {
    border-color: var(--neon-green);
    color: var(--neon-green);
}
.ra-btn.primary:hover {
    background: var(--neon-green);
    color: var(--bg-deep);
    box-shadow: 0 0 25px var(--neon-green);
}
.ra-btn.secondary {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
}
.ra-btn.secondary:hover {
    background: var(--neon-cyan);
    color: var(--bg-deep);
    box-shadow: 0 0 25px var(--neon-cyan);
}

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
@media (max-width: 620px) {
    .options-grid  { grid-template-columns: 1fr; }
    .global-stats  { grid-template-columns: 1fr 1fr; }
    .result-stats  { grid-template-columns: 1fr; }
    .result-actions { flex-direction: column; }
    .quiz-shell    { padding: 1rem; }
}

    </style>
</head>

];

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let state = {
    quizId:    null,
    questions: [],
    index:     0,
    correct:   0,
    streak:    0,
    bestStreak:0,
    lives:     5,
    log:       [],      // { q, correct, chosen, expln }
    results:   {},      // { quizId: { correct, pct, stars } }
};

const MAX_LIVES = 5;

function loadPersist() {
    try {
        const s = JSON.parse(localStorage.getItem('quizState') || '{}');
        state.results    = s.results    || {};
        state.bestStreak = s.bestStreak || 0;
    } catch(_) {}
}

function savePersist() {
    const total   = Object.values(state.results).reduce((a,r) => a + (r.correct || 0), 0) * 10;
    const done    = Object.keys(state.results).length;
    const allPct  = done ? Math.round(Object.values(state.results).reduce((a,r) => a + (r.pct || 0), 0) / done) : null;
    localStorage.setItem('quizState', JSON.stringify({
        results:    state.results,
        bestStreak: state.bestStreak,
        totalScore: total,
        done,
        avgPct:     allPct,
    }));
}

// Reset all quiz progress
function resetAllProgress() {
    if (confirm('⚠️ WARNING: This will reset ALL quiz progress, scores, and best streaks. This action cannot be undone!')) {
        state.results = {};
        state.bestStreak = 0;
        savePersist();
        renderHome();
        alert('All quiz progress has been reset!');
    }
}

// ════════════════════════════════════════════════════════════
// HOME SCREEN
// ════════════════════════════════════════════════════════════
function renderHome() {
    loadPersist();

    // global stats
    const done    = Object.keys(state.results).length;
    const allPcts = Object.values(state.results).map(r => r.pct || 0);
    const avgAcc  = allPcts.length ? Math.round(allPcts.reduce((a,b)=>a+b,0)/allPcts.length) : null;
    const total   = Object.values(state.results).reduce((a,r)=>a+(r.correct||0),0) * 10;

    document.getElementById('gsTotal').textContent     = total;
    document.getElementById('gsCompleted').textContent = done + ' / ' + QUIZZES.length;
    document.getElementById('gsStreak').textContent    = state.bestStreak + '🔥';
    document.getElementById('gsAcc').textContent       = avgAcc !== null ? avgAcc + '%' : '—';

    // quiz cards
    const grid = document.getElementById('quizCardGrid');
    grid.innerHTML = '';

    QUIZZES.forEach(quiz => {
        const res  = state.results[quiz.id];
        const pct  = res ? res.pct   : 0;
        const stars = res ? res.stars : 0;

        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.style.setProperty('--accent', quiz.accent);

        const starHtml = [1,2,3].map(i =>
            `<i class="fas fa-star${i <= stars ? ' lit' : ''}"></i>`
        ).join('');

        card.innerHTML = `
            ${res ? '<span class="qc-badge done">✓ Done</span>' : ''}
            <div class="qc-top">
                <span class="qc-icon">${quiz.icon}</span>
                <div class="qc-title">${quiz.title}</div>
                <div class="qc-desc">${quiz.desc}</div>
            </div>
            <div class="qc-bottom">
                <span class="qc-meta">10 Qs</span>
                <div class="qc-progress-wrap">
                    <div class="qc-progress-fill" style="width:${pct}%"></div>
                </div>
                <span class="qc-pct">${pct ? pct + '%' : '—'}</span>
            </div>
            <div style="padding: 0.5rem 1.5rem 1rem; display:flex; justify-content:space-between; align-items:center;">
                <div class="qc-stars">${starHtml}</div>
                <span style="font-size:0.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;">
                    ${res ? 'Best: ' + res.correct + '/10' : 'Not started'}
                </span>
            </div>
        `;
        card.addEventListener('click', () => startQuiz(quiz.id));
        grid.appendChild(card);
    });
}

// ════════════════════════════════════════════════════════════
// START QUIZ
// ════════════════════════════════════════════════════════════
function startQuiz(id) {
    const quiz = QUIZZES.find(q => q.id === id);
    if (!quiz) return;

    // shuffle questions
    const shuffled = [...quiz.questions].sort(() => Math.random() - 0.5);

    state.quizId    = id;
    state.questions = shuffled;
    state.index     = 0;
    state.correct   = 0;
    state.streak    = 0;
    state.lives     = MAX_LIVES;
    state.log       = [];

    showScreen('screenQuiz');
    renderLives();
    showQuestion();
}

// ════════════════════════════════════════════════════════════
// QUESTION RENDER
// ════════════════════════════════════════════════════════════
function showQuestion() {
    const q       = state.questions[state.index];
    const total   = state.questions.length;
    const pct     = (state.index / total) * 100;
    const quiz    = QUIZZES.find(x => x.id === state.quizId);

    // topbar
    document.getElementById('topProgress').style.width = pct + '%';
    document.getElementById('qCounter').textContent    = (state.index + 1) + ' / ' + total;
    document.getElementById('streakDisplay').textContent = state.streak;

    // category tag
    const tag = document.getElementById('qCatTag');
    tag.style.borderColor = quiz.accent;
    tag.style.color       = quiz.accent;
    tag.innerHTML = `${quiz.icon} ${quiz.title}`;

    // question card
    const card = document.getElementById('questionCard');
    card.dataset.num = state.index + 1;
    card.style.borderColor = 'rgba(0,255,157,0.15)';
    document.getElementById('questionText').innerHTML = q.q;

    // reset feedback + next
    const fb = document.getElementById('feedbackBanner');
    fb.className = 'feedback-banner';
    const nb = document.getElementById('nextBtn');
    nb.className = 'next-btn';

    // render options
    const letters = ['A', 'B', 'C', 'D'];
    const grid    = document.getElementById('optionsGrid');
    grid.innerHTML = '';

    // shuffle option order
    const indices = [0,1,2,3].sort(() => Math.random() - 0.5);
    const correctLetter = String.fromCharCode(65 + indices.indexOf(q.ans));

    indices.forEach((origIdx, pos) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.dataset.orig = origIdx;
        btn.innerHTML = `
            <span class="opt-letter" style="color:${quiz.accent};border-color:${quiz.accent};">
                ${letters[pos]}
            </span>
            ${q.opts[origIdx]}
        `;
        btn.addEventListener('click', () => onAnswer(btn, origIdx, q, indices));
        grid.appendChild(btn);
    });
}

// ════════════════════════════════════════════════════════════
// ANSWER HANDLING
// ════════════════════════════════════════════════════════════
function onAnswer(clickedBtn, chosenOrig, q, indices) {
    // disable all
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

    const isCorrect = chosenOrig === q.ans;

    // mark buttons
    document.querySelectorAll('.option-btn').forEach(btn => {
        const orig = parseInt(btn.dataset.orig);
        if (orig === q.ans)    btn.classList.add(isCorrect ? 'correct' : 'reveal-correct');
        if (orig === chosenOrig && !isCorrect) btn.classList.add('wrong');
    });
    if (isCorrect) clickedBtn.classList.remove('reveal-correct');
    if (isCorrect) clickedBtn.classList.add('correct');

    // feedback
    const fb   = document.getElementById('feedbackBanner');
    const head = document.getElementById('fbHeading');
    const txt  = document.getElementById('fbText');

    if (isCorrect) {
        state.correct++;
        state.streak++;
        if (state.streak > state.bestStreak) state.bestStreak = state.streak;
        fb.classList.add('show', 'correct-fb');
        head.innerHTML = '<i class="fas fa-check-circle"></i> Correct!';
        txt.innerHTML  = q.exp;
        document.getElementById('questionCard').style.borderColor = 'rgba(80,250,123,0.3)';
    } else {
        state.streak = 0;
        state.lives--;
        renderLives();
        fb.classList.add('show', 'wrong-fb');
        head.innerHTML = '<i class="fas fa-times-circle"></i> Not quite';
        txt.innerHTML  = q.exp;
        document.getElementById('questionCard').style.borderColor = 'rgba(255,85,85,0.3)';
    }

    state.log.push({ q: q.q, correct: isCorrect, chosen: q.opts[chosenOrig], answer: q.opts[q.ans] });
    document.getElementById('streakDisplay').textContent = state.streak;

    // show next
    const nb = document.getElementById('nextBtn');
    nb.classList.add('show');
    nb.textContent = state.index + 1 === state.questions.length
        ? '  See Results  ' : '  Continue  ';
    nb.innerHTML += ' <i class="fas fa-arrow-right"></i>';
}

function nextQuestion() {
    state.index++;
    if (state.index >= state.questions.length) {
        showResults();
    } else {
        showQuestion();
    }
}

// ════════════════════════════════════════════════════════════
// LIVES
// ════════════════════════════════════════════════════════════
function renderLives() {
    const row = document.getElementById('livesRow');
    row.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++) {
        const dot = document.createElement('div');
        dot.className = 'life-dot' + (i >= state.lives ? ' lost' : '');
        row.appendChild(dot);
    }
}

// ════════════════════════════════════════════════════════════
// RESULTS
// ════════════════════════════════════════════════════════════
function showResults() {
    const total   = state.questions.length;
    const correct = state.correct;
    const pct     = Math.round((correct / total) * 100);

    // grade + emoji
    const grades = [
        { min:100, grade:'S', emoji:'🏆', label:'PERFECT SCORE' },
        { min:90,  grade:'A', emoji:'⚡', label:'EXCELLENT' },
        { min:70,  grade:'B', emoji:'🔥', label:'GREAT WORK' },
        { min:50,  grade:'C', emoji:'💡', label:'KEEP LEARNING' },
        { min:0,   grade:'D', emoji:'🔁', label:'TRY AGAIN' },
    ];
    const g = grades.find(x => pct >= x.min);

    // stars
    const stars = pct === 100 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;

    // save
    const prev = state.results[state.quizId];
    if (!prev || correct > prev.correct) {
        state.results[state.quizId] = { correct, pct, stars };
    }
    savePersist();
    syncUserScore(correct * 10);

    // DOM
    document.getElementById('resultEmoji').textContent  = g.emoji;
    document.getElementById('resultGrade').textContent  = g.grade;
    document.getElementById('resultLabel').textContent  = g.label;
    document.getElementById('scoreNum').textContent     = correct;
    document.getElementById('scoreDen').textContent     = '/ ' + total;
    document.getElementById('rCorrect').textContent     = correct;
    document.getElementById('rWrong').textContent       = total - correct;
    document.getElementById('rAcc').textContent         = pct + '%';

    // animated ring
    const circumference = 2 * Math.PI * 65; // ~408.4
    const offset = circumference * (1 - pct / 100);
    const ring = document.getElementById('ringFill');
    ring.style.strokeDasharray  = circumference;
    ring.style.strokeDashoffset = circumference;
    setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);

    // review list
    const reviewDiv = document.getElementById('reviewItems');
    reviewDiv.innerHTML = state.log.map((entry, i) => `
        <div class="review-item ${entry.correct ? 'r-correct' : 'r-wrong'}">
            <span class="r-icon">
                ${entry.correct
                    ? '<i class="fas fa-check-circle" style="color:var(--diff-beginner)"></i>'
                    : '<i class="fas fa-times-circle" style="color:var(--diff-advanced)"></i>'}
            </span>
            <div>
                <div class="r-q">Q${i+1}: ${entry.q}</div>
                ${!entry.correct
                    ? `<div class="r-a">✓ ${entry.answer}</div>`
                    : ''}
            </div>
        </div>
    `).join('');

    showScreen('screenResults');
}

// ════════════════════════════════════════════════════════════
// NAVIGATION HELPERS
// ════════════════════════════════════════════════════════════
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome()    { showScreen('screenHome');  renderHome(); }
function retryQuiz() { startQuiz(state.quizId); }
function quitQuiz()  { if (confirm('Quit this quiz? Progress will be lost.')) goHome(); }

function syncUserScore(pts) {
    try {
        const raw  = localStorage.getItem('user') || sessionStorage.getItem('user') || '{}';
        const user = JSON.parse(raw);
        user.points = (user.points || 0) + pts;
        const store = localStorage.getItem('user') ? localStorage : sessionStorage;
        store.setItem('user', JSON.stringify(user));
    } catch(_) {}
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    loadPersist();
    renderHome();

    // auth link
    try {
        const raw = localStorage.getItem('user') || sessionStorage.getItem('user');
        if (raw) {
            const u = JSON.parse(raw);
            const l = document.getElementById('auth-link');
            if (l && u.username) l.textContent = u.username;
        }
    } catch(_) {}
});
</script>
</body>

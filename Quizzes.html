<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes - CTF Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== CYBERPUNK THEME ===== */
        :root {
            --neon-green: #50fa7b;
            --neon-blue: #3e9eff;
            --neon-cyan: #8be9fd;
            --neon-purple: #bd93f9;
            --neon-yellow: #f1fa8c;
            --neon-red: #ff5555;
            --neon-orange: #ffb86b;
            --neon-pink: #ff79c6;
            --legendary-gold: #ffd700;
            --bg-primary: #0a0e1a;
            --bg-secondary: #141b2b;
            --bg-panel: #0f1322;
            --bg-deep: #05080f;
            --border-color: #2a3550;
            --text-primary: #e0e0e0;
            --text-secondary: #8892b0;
            --diff-beginner: #50fa7b;
            --diff-intermediate: #ffb86b;
            --diff-advanced: #ff5555;
            --glow-green: rgba(80, 250, 123, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', 'Share Tech Mono', monospace; overflow-x: hidden; }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
        }

        .navbar {
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-green);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(80, 250, 123, 0.3);
            cursor: pointer;
        }

        .logo i { margin-right: 0.5rem; }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-green);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::before,
        .nav-links a.active::before {
            width: 100%;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--neon-green);
        }

        .logout-btn {
            background: rgba(255, 85, 85, 0.15);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: var(--neon-red);
            color: var(--bg-primary);
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.4);
        }

        .user-greeting {
            color: var(--neon-green);
            font-size: 0.85rem;
            margin-right: 0.5rem;
            background: rgba(80, 250, 123, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid rgba(80, 250, 123, 0.3);
        }

        .quiz-shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 80px);
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fade-in 0.35s ease; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HOME SCREEN */
        .home-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .home-header .tagline {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .reset-my-btn {
            background: transparent;
            border: 2px solid var(--neon-orange);
            color: var(--neon-orange);
            padding: 0.5rem 1.2rem;
            font-family: monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-right: 0.5rem;
            border-radius: 8px;
        }

        .reset-my-btn:hover {
            background: var(--neon-orange);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--neon-orange);
        }

        .global-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .g-stat {
            background: var(--bg-panel);
            border: 1px solid rgba(0,255,157,0.18);
            padding: 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.25s;
            border-radius: 12px;
        }
        .g-stat:hover { border-color: var(--neon-green); }
        .g-stat .g-val {
            display: block;
            font-family: monospace;
            font-size: 1.7rem;
            color: var(--neon-green);
            text-shadow: 0 0 12px var(--neon-green);
            position: relative;
        }
        .g-stat .g-lbl {
            display: block;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            position: relative;
        }

        /* 3-COLUMN GRID */
        .quiz-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .quiz-cards { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .quiz-cards { grid-template-columns: 1fr; }
            .global-stats { grid-template-columns: 1fr 1fr; }
        }

        .quiz-card {
            background: var(--bg-panel);
            border: 1px solid rgba(0,255,157,0.2);
            border-radius: 12px;
            padding: 0;
            cursor: pointer;
            transition: all 0.28s ease;
            overflow: hidden;
            position: relative;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent, var(--neon-green));
            transition: width 0.25s ease;
        }
        .quiz-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,157,0.15); border-color: var(--accent, var(--neon-green)); }
        .quiz-card:hover::before { width: 5px; }

        .quiz-card.completed { border-color: var(--neon-green); background: rgba(80,250,123,0.05); }

        .qc-top {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .qc-icon { font-size: 2.2rem; margin-bottom: 0.85rem; display: block; }
        .qc-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-primary);
            margin-bottom: 0.35rem;
        }
        .qc-desc {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .qc-bottom {
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .qc-meta {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .qc-progress-wrap {
            flex: 1;
            margin: 0 0.85rem;
            height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            overflow: hidden;
        }
        .qc-progress-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent, var(--neon-green));
            transition: width 0.6s ease;
            box-shadow: 0 0 6px var(--accent, var(--neon-green));
        }
        .qc-pct {
            font-size: 0.72rem;
            font-family: monospace;
            color: var(--accent, var(--neon-green));
        }

        .qc-stars { display: flex; gap: 3px; }
        .qc-stars i { font-size: 0.75rem; color: rgba(255,255,255,0.15); }
        .qc-stars i.lit { color: var(--neon-yellow); text-shadow: 0 0 6px var(--neon-yellow); }

        .qc-badge {
            position: absolute;
            top: 0.7rem; right: 0.7rem;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.18rem 0.55rem;
            border: 1px solid;
            border-radius: 4px;
        }
        .qc-badge.done { color: var(--diff-beginner); border-color: var(--diff-beginner); }

        /* QUIZ SCREEN */
        .quiz-container {
            max-width: 860px;
            margin: 0 auto;
        }

        .quiz-topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .quit-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-secondary);
            padding: 0.4rem 0.75rem;
            font-size: 0.78rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            flex-shrink: 0;
            border-radius: 6px;
        }
        .quit-btn:hover { border-color: var(--neon-red); color: var(--neon-red); }

        .top-progress-track {
            flex: 1;
            height: 7px;
            background: rgba(255,255,255,0.07);
            border-radius: 4px;
            overflow: hidden;
        }
        .top-progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
            transition: width 0.55s ease;
            box-shadow: 0 0 8px rgba(0,255,157,0.5);
        }

        .q-counter {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .quiz-meta-row {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.75rem;
        }

        .streak-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.82rem;
        }
        .streak-badge i { color: var(--neon-yellow); }
        .streak-badge span { color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }

        .lives-row {
            display: flex;
            gap: 0.3rem;
            margin-left: auto;
        }
        .life-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--neon-red);
            box-shadow: 0 0 8px var(--neon-red);
            transition: all 0.3s;
        }
        .life-dot.lost {
            background: rgba(255,255,255,0.1);
            box-shadow: none;
        }

        .q-category-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0.25rem 0.75rem;
            border: 1px solid;
            margin-bottom: 1.25rem;
            border-radius: 20px;
        }

        .question-card {
            background: var(--bg-panel);
            border: 1px solid rgba(0,255,157,0.15);
            padding: 2rem;
            margin-bottom: 1.25rem;
            position: relative;
            overflow: hidden;
            animation: card-in 0.3s ease;
            border-radius: 12px;
        }
        @keyframes card-in {
            from { opacity:0; transform: scale(0.97) translateY(8px); }
            to { opacity:1; transform: scale(1) translateY(0); }
        }

        .question-text {
            font-size: 1.12rem;
            color: var(--text-primary);
            line-height: 1.7;
            margin: 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .option-btn {
            background: var(--bg-deep);
            border: 2px solid rgba(0,243,255,0.2);
            color: var(--text-primary);
            font-size: 0.92rem;
            padding: 1rem 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.22s ease;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            line-height: 1.45;
            border-radius: 8px;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: translateX(3px);
        }

        .opt-letter {
            font-size: 0.72rem;
            font-weight: 700;
            width: 24px; height: 24px;
            border: 1.5px solid;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.2s;
        }

        .option-btn.correct {
            border-color: var(--diff-beginner) !important;
            background: rgba(80,250,123,0.12) !important;
            color: var(--diff-beginner) !important;
        }
        .option-btn.correct .opt-letter {
            background: var(--diff-beginner);
            border-color: var(--diff-beginner);
            color: var(--bg-deep);
        }

        .option-btn.wrong {
            border-color: var(--diff-advanced) !important;
            background: rgba(255,85,85,0.10) !important;
            color: var(--diff-advanced) !important;
        }
        .option-btn.wrong .opt-letter {
            background: var(--diff-advanced);
            border-color: var(--diff-advanced);
            color: var(--bg-deep);
        }

        .option-btn:disabled { cursor: default; transform: none !important; opacity: 0.7; }

        .feedback-banner {
            display: none;
            padding: 1.1rem 1.5rem;
            border-left: 4px solid;
            margin-bottom: 1rem;
            animation: banner-slide 0.3s ease;
            border-radius: 8px;
        }
        @keyframes banner-slide {
            from { opacity:0; transform: translateY(-8px); }
            to { opacity:1; transform: translateY(0); }
        }
        .feedback-banner.show { display: block; }
        .feedback-banner.correct-fb {
            background: rgba(80,250,123,0.08);
            border-color: var(--diff-beginner);
        }
        .feedback-banner.wrong-fb {
            background: rgba(255,85,85,0.08);
            border-color: var(--diff-advanced);
        }

        .fb-heading {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .feedback-banner.correct-fb .fb-heading { color: var(--diff-beginner); }
        .feedback-banner.wrong-fb .fb-heading { color: var(--diff-advanced); }
        .fb-text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .next-btn {
            width: 100%;
            padding: 1rem;
            background: var(--neon-green);
            border: none;
            color: var(--bg-deep);
            font-size: 0.88rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            display: none;
            transition: all 0.25s;
            border-radius: 8px;
        }
        .next-btn.show { display: block; animation: fade-in 0.25s ease; }
        .next-btn:hover { box-shadow: 0 0 30px var(--neon-green); }

        /* RESULTS SCREEN */
        .results-card {
            background: var(--bg-panel);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 60px rgba(0,255,157,0.15);
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 2rem;
            border-radius: 16px;
        }

        .result-emoji {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            animation: pop-in 0.5s ease;
            display: block;
        }
        @keyframes pop-in {
            from { transform: scale(0); opacity:0; }
            to { transform: scale(1); opacity:1; }
        }

        .result-grade {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2rem;
        }

        .score-ring-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 2rem;
        }
        .score-ring-svg { transform: rotate(-90deg); }
        .score-ring-bg { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 10; }
        .score-ring-fill {
            fill: none;
            stroke: url(#ringGrad);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 408;
            stroke-dashoffset: 408;
            transition: stroke-dashoffset 1.2s ease;
        }
        .score-ring-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-ring-text .score-num {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
            line-height: 1;
        }
        .score-ring-text .score-den {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .r-stat {
            background: var(--bg-deep);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 0.9rem 0.5rem;
            border-radius: 8px;
        }
        .r-stat .r-val {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 0.2rem;
        }
        .r-stat .r-lbl {
            display: block;
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .r-stat.correct .r-val { color: var(--diff-beginner); }
        .r-stat.wrong .r-val { color: var(--diff-advanced); }
        .r-stat.acc .r-val { color: var(--neon-cyan); }

        .review-list {
            text-align: left;
            margin-bottom: 2rem;
        }

        .review-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .review-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.65rem 0.85rem;
            border-left: 3px solid;
            margin-bottom: 0.5rem;
            background: var(--bg-deep);
            font-size: 0.83rem;
            line-height: 1.4;
            border-radius: 8px;
        }
        .review-item.r-correct { border-color: var(--diff-beginner); }
        .review-item.r-wrong { border-color: var(--diff-advanced); }
        .review-item .r-icon { flex-shrink: 0; margin-top: 1px; }
        .review-item .r-q { color: var(--text-secondary); }
        .review-item .r-a { color: var(--text-primary); font-size:0.78rem; margin-top:0.2rem; }

        .result-actions {
            display: flex;
            gap: 0.85rem;
        }

        .ra-btn {
            flex: 1;
            padding: 0.85rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s;
            border: 2px solid;
            background: transparent;
            border-radius: 8px;
        }
        .ra-btn.primary {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }
        .ra-btn.primary:hover {
            background: var(--neon-green);
            color: var(--bg-deep);
            box-shadow: 0 0 25px var(--neon-green);
        }
        .ra-btn.secondary {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        .ra-btn.secondary:hover {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 10001;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<nav class="navbar">
    <div class="logo" onclick="navigateTo('homepage.html')">
        <i class="fas fa-shield-alt"></i>
        UTECH CTF HUB
    </div>
    <ul class="nav-links">
        <li><a onclick="navigateTo('homepage.html')">Home</a></li>
        <li><a onclick="navigateTo('CTF learning material.html')">Learn</a></li>
        <li><a onclick="navigateTo('CTF challenge.html')">Challenges</a></li>
        <li><a class="active">Quizzes</a></li>
        <li><a onclick="navigateTo('CTF scoreboard.html')">Scoreboard</a></li>
        <li id="authContainer" style="display: flex; align-items: center; gap: 0.8rem;"></li>
    </ul>
</nav>

<main class="quiz-shell">
    <!-- HOME SCREEN -->
    <div class="screen active" id="screenHome">

<script>
// Matrix Rain Effect
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*";
let drops = [];
function initDrops() { drops = []; for(let i=0; i<canvas.width/14; i++) drops[i]=Math.random()*canvas.height; }
initDrops();
function drawMatrix() {
    if(!ctx) return;
    ctx.fillStyle = 'rgba(10,10,10,0.04)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#50fa7b';
    ctx.font = '14px monospace';
    for(let i=0;i<drops.length;i++) {
        ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, drops[i]*14);
        if(drops[i]*14 > canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix,35);
window.addEventListener('resize',()=>{ resizeCanvas(); initDrops(); });

// Database Keys
const DB_KEYS = {
    USERS: 'ctf_users',

    STUDENT_QUIZ_STREAK: (username) => `student_quiz_streak_${username}`
};

// Auth Functions
function getCurrentUser() {
    const user = localStorage.getItem('user') || sessionStorage.getItem('user');
    if(user) { try { return JSON.parse(user); } catch(e) { return null; } }
    return null;
}

function navigateTo(page) { window.location.href = page; }

function showToast(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderColor = isError ? '#ff5555' : '#50fa7b';
    toast.style.color = isError ? '#ff5555' : '#50fa7b';
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function updateAuthUI() {
    const authContainer = document.getElementById('authContainer');
    if(!authContainer) return;
    const user = getCurrentUser();
    if(user && user.username) {
        authContainer.innerHTML = `<span class="user-greeting"><i class="fas fa-user-astronaut"></i> ${escapeHtml(user.username)}</span><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>`;
    } else {
        authContainer.innerHTML = `<a href="login.html" style="display:flex; align-items:center; gap:0.5rem;"><i class="fas fa-sign-in-alt"></i> Login</a>`;
    }
}

function logout() {
    localStorage.removeItem('user');
    sessionStorage.removeItem('user');
    showToast('Logged out successfully');
    setTimeout(() => window.location.href = 'login.html', 1000);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Student-Isolated Progress Functions
function getStudentResults() {
    const user = getCurrentUser();
    if (!user) return {};
    const key = DB_KEYS.STUDENT_QUIZ_RESULTS(user.username);
    try { return JSON.parse(localStorage.getItem(key)) || {}; } catch(e) { return {}; }
}

function saveStudentResults(results) {
    const user = getCurrentUser();
    if (!user) return;
    const key = DB_KEYS.STUDENT_QUIZ_RESULTS(user.username);
    localStorage.setItem(key, JSON.stringify(results));
}

function getStudentStreak() {
    const user = getCurrentUser();
    if (!user) return 0;
    const key = DB_KEYS.STUDENT_QUIZ_STREAK(user.username);
    return parseInt(localStorage.getItem(key)) || 0;
}

    const user = getCurrentUser();
    if (!user) return;

}

        { q: 'What is baiting?', opts: ['Fishing bait', 'Leaving infected USB drives in public', 'Email bait', 'Network bait'], ans: 1, exp: 'Tempting victims with physical media containing malware.' },
        { q: 'What is pretexting in social engineering?', opts: ['Text message attack', 'Fabricated scenario to extract information', 'Email attack', 'Phone attack'], ans: 1, exp: 'Creating believable story to manipulate victim.' },
        { q: 'How to identify phishing email?', opts: ['Check sender domain', 'Look for urgency', 'Hover over links', 'All of above'], ans: 3, exp: 'Multiple red flags: mismatched domains, urgency, suspicious links.' },
        { q: 'What is MFA and how does it help?', opts: ['Multi-Factor Authentication - requires additional verification', 'Main Frame Access', 'Manual Authentication', 'Maximum Authentication'], ans: 0, exp: 'Requires second factor (OTP, biometric) even if password stolen.' }
    ]
};

const QUIZZES = [
    { id: 'crypto', title: 'Cryptography', icon: '🔐', accent: 'var(--neon-purple)', desc: 'Ciphers, hashing, public-key crypto', points: 100 },
    { id: 'steg', title: 'Steganography', icon: '🖼️', accent: 'var(--neon-yellow)', desc: 'Hiding data in images and files', points: 100 },
    { id: 'forensic', title: 'Digital Forensics', icon: '🔍', accent: 'var(--neon-pink)', desc: 'PCAP analysis and investigation', points: 100 },
    { id: 'sql', title: 'SQL Injection', icon: '💉', accent: 'var(--neon-cyan)', desc: 'Query manipulation and defenses', points: 100 },
    { id: 'ethack', title: 'Ethical Hacking', icon: '🛡️', accent: 'var(--neon-green)', desc: 'Core concepts and tools', points: 100 },
    { id: 'bruteforce', title: 'Brute Force', icon: '💣', accent: 'var(--neon-red)', desc: 'Password cracking and mitigation', points: 100 },
    { id: 'malware', title: 'Malware Analysis', icon: '🦠', accent: 'var(--neon-purple)', desc: 'Types and analysis techniques', points: 100 },
    { id: 'vuln', title: 'Vulnerability Assessment', icon: '🔎', accent: 'var(--neon-cyan)', desc: 'Scanning and CVSS', points: 100 },
    { id: 'social', title: 'Social Engineering', icon: '🎭', accent: 'var(--neon-orange)', desc: 'Phishing and manipulation', points: 100 }
];

// State
let currentQuiz = null;
let currentQuestions = [];
let currentIndex = 0;
let currentScore = 0;
let currentStreak = 0;
let currentLives = 5;
let currentAnswers = [];
let quizInProgress = false;

function renderHome() {
    const user = getCurrentUser();
    if (!user) return;
    
    const results = getStudentResults();
    const bestStreak = getStudentStreak();
    
    let totalPoints = 0;
    let completedCount = 0;
    let totalPct = 0;
    
    for (const [quizId, result] of Object.entries(results)) {
        totalPoints += (result.score || 0) * 10;
        completedCount++;
        totalPct += (result.percentage || 0);
    }
    const avgAcc = completedCount > 0 ? Math.round(totalPct / completedCount) : null;
    
    document.getElementById('gsTotal').textContent = totalPoints;
    document.getElementById('gsCompleted').textContent = completedCount + ' / ' + QUIZZES.length;
    document.getElementById('gsStreak').textContent = bestStreak + '🔥';
    document.getElementById('gsAcc').textContent = avgAcc !== null ? avgAcc + '%' : '—';
    
    const grid = document.getElementById('quizCardGrid');
    grid.innerHTML = QUIZZES.map(quiz => {
        const result = results[quiz.id];
        const isCompleted = result && result.score >= 7;
        const scoreText = result ? `${result.score}/10` : 'Not started';
        return `
            <div class="quiz-card ${isCompleted ? 'completed' : ''}" style="--accent: ${quiz.accent}" onclick="startQuiz('${quiz.id}')">
                <div class="qc-top"><span class="qc-icon">${quiz.icon}</span><div class="qc-title">${quiz.title}</div><div class="qc-desc">${quiz.desc}</div></div>
                <div class="qc-bottom"><span class="qc-meta">10 Qs • ${quiz.points} pts</span><div class="qc-progress-wrap"><div class="qc-progress-fill" style="width:${result?.percentage || 0}%"></div></div><span class="qc-pct">${result?.percentage || 0}%</span></div>
                <div style="padding: 0.5rem 1.5rem 1rem; display:flex; justify-content:space-between; align-items:center;"><div class="qc-stars">${[1,2,3].map(i => `<i class="fas fa-star${i <= (result?.stars || 0) ? ' lit' : ''}"></i>`).join('')}</div><span style="font-size:0.7rem;color:var(--text-secondary);">${scoreText}</span></div>
            </div>
        `;
    }).join('');
}

function startQuiz(quizId) {
    const user = getCurrentUser();
    if (!user) { showToast('Please login to take quizzes', true); return; }
    
    const quiz = QUIZZES.find(q => q.id === quizId);
    if (!quiz) return;
    
    currentQuestions = [...QUIZ_QUESTIONS[quizId]];
    currentQuiz = quiz;
    currentIndex = 0;
    currentScore = 0;
    currentStreak = 0;
    currentLives = 5;
    currentAnswers = [];
    quizInProgress = true;
    
    showQuestion();
    showScreen('screenQuiz');
}

function showQuestion() {
    if (!currentQuestions || currentIndex >= currentQuestions.length) { finishQuiz(); return; }
    
    const q = currentQuestions[currentIndex];
    const total = currentQuestions.length;
    const pct = ((currentIndex) / total) * 100;
    
    document.getElementById('topProgress').style.width = pct + '%';
    document.getElementById('qCounter').textContent = (currentIndex + 1) + ' / ' + total;
    document.getElementById('streakDisplay').textContent = currentStreak;
    document.getElementById('qCatTag').innerHTML = `${currentQuiz.icon} ${currentQuiz.title}`;
    document.getElementById('questionText').innerHTML = q.q;
    
    document.getElementById('feedbackBanner').className = 'feedback-banner';
    document.getElementById('nextBtn').classList.remove('show');
    
    const letters = ['A', 'B', 'C', 'D'];
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    
    const indices = [0,1,2,3].sort(() => Math.random() - 0.5);
    
    indices.forEach((origIdx, pos) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="opt-letter" style="color:${currentQuiz.accent};border-color:${currentQuiz.accent};">${letters[pos]}</span> ${q.opts[origIdx]}`;
        btn.onclick = () => onAnswer(btn, origIdx, q);
        grid.appendChild(btn);
    });
    
    renderLives();
}

function onAnswer(btn, chosenIdx, q) {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    const isCorrect = chosenIdx === q.ans;
    
    document.querySelectorAll('.option-btn').forEach(b => { if (b.innerHTML.includes(q.opts[q.ans])) b.classList.add('correct'); });
    
    if (isCorrect) {
        btn.classList.add('correct');
        currentScore++;
        currentStreak++;
        showToast('✓ Correct! +10 points', false);
        document.getElementById('feedbackBanner').className = 'feedback-banner show correct-fb';
        document.getElementById('fbHeading').innerHTML = '<i class="fas fa-check-circle"></i> Correct!';
        document.getElementById('fbText').innerHTML = q.exp;
    } else {
        btn.classList.add('wrong');
        currentStreak = 0;
        currentLives--;
        showToast('✗ Incorrect', true);
        document.getElementById('feedbackBanner').className = 'feedback-banner show wrong-fb';
        document.getElementById('fbHeading').innerHTML = '<i class="fas fa-times-circle"></i> Not quite';
        document.getElementById('fbText').innerHTML = q.exp;
        if (currentLives <= 0) { showToast('💀 You ran out of lives!', true); setTimeout(() => finishQuiz(), 1500); return; }
    }
    
    currentAnswers.push({ question: q.q, correct: isCorrect, selected: q.opts[chosenIdx], correctAnswer: q.opts[q.ans], explanation: q.exp });
    renderLives();
    document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() { currentIndex++; if (currentIndex >= currentQuestions.length || currentLives <= 0) finishQuiz(); else showQuestion(); }

function finishQuiz() {
    quizInProgress = false;
    const total = currentQuestions.length;
    const percentage = Math.round((currentScore / total) * 100);
    const stars = percentage === 100 ? 3 : percentage >= 70 ? 2 : percentage >= 50 ? 1 : 0;
    
    const results = getStudentResults();
    const existing = results[currentQuiz.id];
    if (!existing || currentScore > existing.score) {
        results[currentQuiz.id] = { score: currentScore, total: total, percentage: percentage, stars: stars, completedAt: new Date().toISOString() };
        saveStudentResults(results);
        const bestStreak = getStudentStreak();
        if (currentStreak > bestStreak) saveStudentStreak(currentStreak);
        recordToGlobalSubmissions(currentQuiz.id, currentQuiz.title, currentScore, total);
        showToast(`Quiz completed! You earned ${currentScore * 10} points!`, false);
    }
    
    const grade = percentage === 100 ? 'Perfect!' : percentage >= 70 ? 'Great Job!' : percentage >= 50 ? 'Good Try!' : 'Keep Practicing!';
    const emoji = percentage === 100 ? '🏆' : percentage >= 70 ? '🎉' : percentage >= 50 ? '📚' : '💪';
    
    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultGrade').textContent = grade;
    document.getElementById('resultLabel').textContent = `${percentage}% Accuracy`;
    document.getElementById('scoreNum').textContent = currentScore;
    document.getElementById('scoreDen').textContent = '/ ' + total;
    document.getElementById('rCorrect').textContent = currentScore;
    document.getElementById('rWrong').textContent = total - currentScore;
    document.getElementById('rAcc').textContent = percentage + '%';
    
    const circumference = 2 * Math.PI * 65;
    const offset = circumference * (1 - percentage / 100);
    const ring = document.getElementById('ringFill');
    ring.style.strokeDasharray = circumference;
    ring.style.strokeDashoffset = circumference;
    setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);
    
    document.getElementById('reviewItems').innerHTML = currentAnswers.map((a, i) => `
        <div class="review-item ${a.correct ? 'r-correct' : 'r-wrong'}">
            <span class="r-icon"><i class="fas ${a.correct ? 'fa-check-circle' : 'fa-times-circle'}" style="color:${a.correct ? 'var(--diff-beginner)' : 'var(--diff-advanced)'}"></i></span>
            <div><div class="r-q">Q${i+1}: ${a.question}</div>${!a.correct ? `<div class="r-a">✓ ${a.correctAnswer}</div>` : ''}<div class="r-a" style="font-size:0.7rem; margin-top:0.3rem;">${a.explanation}</div></div>
        </div>
    `).join('');
    
    showScreen('screenResults');
    renderHome();
}

function recordToGlobalSubmissions(quizId, quizTitle, score, totalQuestions) {
    const user = getCurrentUser();
    if (!user) return;
    const pointsEarned = score * 10;
    let submissions = JSON.parse(localStorage.getItem(DB_KEYS.SUBMISSIONS) || '[]');
    const existingIndex = submissions.findIndex(s => s.userName === user.username && s.quizId === quizId && s.type === 'quiz');
    const submission = { id: Date.now(), userId: user.id || Date.now(), userName: user.username, quizId, quizTitle, score, totalQuestions, points: pointsEarned, type: 'quiz', time: new Date().toISOString(), timestamp: Date.now() };
    if (existingIndex !== -1) { if (submissions[existingIndex].score < score) submissions[existingIndex] = submission; else return; } 
    else { submissions.push(submission); }
    localStorage.setItem(DB_KEYS.SUBMISSIONS, JSON.stringify(submissions));
    updateUserPoints(user.username, pointsEarned, quizId);
}

function updateUserPoints(username, points, quizId) {
    let pointsData = JSON.parse(localStorage.getItem(DB_KEYS.USER_POINTS) || '{}');
    if (!pointsData[username]) pointsData[username] = { total: 0, challenges: {}, quizzes: {}, lastUpdated: Date.now() };
    const existingPoints = pointsData[username].quizzes?.[quizId]?.points || 0;
    if (existingPoints < points) {
        pointsData[username].total = pointsData[username].total - existingPoints + points;
        pointsData[username].quizzes = pointsData[username].quizzes || {};
        pointsData[username].quizzes[quizId] = { points, completedAt: Date.now() };
        pointsData[username].lastUpdated = Date.now();
        localStorage.setItem(DB_KEYS.USER_POINTS, JSON.stringify(pointsData));
    }
    const users = JSON.parse(localStorage.getItem(DB_KEYS.USERS) || '{}');
    if (users[username]) { users[username].points = pointsData[username].total; localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users)); }
}

function resetMyProgress() {
    const user = getCurrentUser();
    if (!user) return;
    if (confirm('⚠️ This will reset ALL your quiz progress and points earned from quizzes. This cannot be undone!')) {
        localStorage.removeItem(DB_KEYS.STUDENT_QUIZ_RESULTS(user.username));
        localStorage.removeItem(DB_KEYS.STUDENT_QUIZ_STREAK(user.username));
        let submissions = JSON.parse(localStorage.getItem(DB_KEYS.SUBMISSIONS) || '[]');
        submissions = submissions.filter(s => !(s.userName === user.username && s.type === 'quiz'));
        localStorage.setItem(DB_KEYS.SUBMISSIONS, JSON.stringify(submissions));
        let pointsData = JSON.parse(localStorage.getItem(DB_KEYS.USER_POINTS) || '{}');
        if (pointsData[user.username]) { pointsData[user.username].quizzes = {}; pointsData[user.username].total = Object.values(pointsData[user.username].challenges || {}).reduce((sum, c) => sum + (c.points || 0), 0); pointsData[user.username].lastUpdated = Date.now(); localStorage.setItem(DB_KEYS.USER_POINTS, JSON.stringify(pointsData)); }
        const users = JSON.parse(localStorage.getItem(DB_KEYS.USERS) || '{}');
        if (users[user.username]) { users[user.username].points = pointsData[user.username]?.total || 0; localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users)); }
        const sessionUser = getCurrentUser();
        if (sessionUser) { sessionUser.points = users[user.username]?.points || 0; if (sessionStorage.getItem('user')) sessionStorage.setItem('user', JSON.stringify(sessionUser)); else localStorage.setItem('user', JSON.stringify(sessionUser)); }
        showToast('Your quiz progress has been reset!');
        renderHome();
    }
}

function renderLives() { const row = document.getElementById('livesRow'); row.innerHTML = ''; for (let i = 0; i < 5; i++) { const dot = document.createElement('div'); dot.className = 'life-dot' + (i >= currentLives ? ' lost' : ''); row.appendChild(dot); } }
function showScreen(screenId) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(screenId).classList.add('active'); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function goHome() { showScreen('screenHome'); renderHome(); }
function retryQuiz() { if (currentQuiz) startQuiz(currentQuiz.id); }
function quitQuiz() { if (confirm('Quit this quiz? Progress will be lost.')) goHome(); }

document.addEventListener('DOMContentLoaded', () => { updateAuthUI(); if (getCurrentUser()) renderHome(); });
</script>
